const gerarProntuario = (nome,nasc)=>{
  if(!nome||!nasc) return "";
  const ini=nome.trim().split(/\s+/).filter(Boolean).map(p=>p[0]).join("").toUpperCase().replace(/[^A-Z]/g,"");
  const nums=nasc.replace(/\D/g,"");
  if(ini.length<2||nums.length<8) return "";
  return `${ini}${nums.slice(0,2)}${nums.slice(2,4)}${nums.slice(4,8)}`;
};
const calcIdade=nasc=>{
  if(!nasc) return null;
  const [dd,mm,aaaa]=nasc.split("/");
  if(!dd||!mm||!aaaa||aaaa.length<4) return null;
  const today=new Date(),birth=new Date(`${aaaa}-${mm}-${dd}`);
  let age=today.getFullYear()-birth.getFullYear();
  const m=today.getMonth()-birth.getMonth();
  if(m<0||(m===0&&today.getDate()<birth.getDate())) age--;
  return isNaN(age)?null:age;
};
const diasAdmitido=adm=>{
  if(!adm) return null;
  const [dd,mm,aaaa]=adm.split("/");
  if(!dd||!mm||!aaaa||aaaa.length<4) return null;
  const diff=(Date.now()-new Date(`${aaaa}-${mm}-${dd}`))/86400000;
  return isNaN(diff)?null:Math.max(0,Math.floor(diff));
};
const maskDate=v=>{const d=v.replace(/\D/g,"").slice(0,8);if(d.length<=2)return d;if(d.length<=4)return`${d.slice(0,2)}/${d.slice(2)}`;return`${d.slice(0,2)}/${d.slice(2,4)}/${d.slice(4)}`;};
const maskCPF=v=>{const d=v.replace(/\D/g,"").slice(0,11);if(d.length<=3)return d;if(d.length<=6)return`${d.slice(0,3)}.${d.slice(3)}`;if(d.length<=9)return`${d.slice(0,3)}.${d.slice(3,6)}.${d.slice(6)}`;return`${d.slice(0,3)}.${d.slice(3,6)}.${d.slice(6,9)}-${d.slice(9)}`;};
const maskPhone=v=>{const d=v.replace(/\D/g,"").slice(0,11);if(d.length<=2)return`(${d}`;if(d.length<=7)return`(${d.slice(0,2)}) ${d.slice(2)}`;return`(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`;};
const maskCID=v=>v.replace(/[^A-Za-z0-9.]/g,"").toUpperCase().slice(0,7);
const hoje=()=>new Date().toLocaleDateString("pt-BR");

    orange:{background:C.orange,color:"#fff",fontWeight:700},
    ghost:{background:"transparent",color:C.primary,fontWeight:700},

      style={{cursor:disabled?"not-allowed":"pointer",border:"none",borderRadius:"999px",
        fontFamily:"inherit",transition:"all 0.15s",display:"inline-flex",alignItems:"center",gap:6,
        opacity:disabled?0.5:1,...pad,...vars[variant],...style}}>

const Input=({label,value,onChange,placeholder,mask,type="text",required,error,hint,disabled,style={}})=>{
  const handle=e=>{
    let v=e.target.value;
    if(mask==="date")  v=maskDate(v);
    if(mask==="cpf")   v=maskCPF(v);
    if(mask==="phone") v=maskPhone(v);
    if(mask==="cid")   v=maskCID(v);
    if(mask==="name")  v=v.replace(/[0-9]/g,"");
    onChange(v);
  };
  return (
    <div style={{display:"flex",flexDirection:"column",gap:3,...style}}>
      {label&&<label style={{fontSize:11,fontWeight:600,color:error?C.danger:C.textMuted,letterSpacing:"0.04em",textTransform:"uppercase"}}>{label}{required&&<span style={{color:C.danger}}> *</span>}</label>}

};

const AtividadeModal=({paciente,onClose,onSalvar})=>{
  const [form,setForm]=useState({data:hoje(),tipo:"",profissional:"",horas:"0",minutos:"",descricao:"",intercorrencia:false});

    if(!form.profissional){setErr("Informe o profissional."); return;}
    const h=parseInt(form.horas)||0, m=parseInt(form.minutos)||0;
    const duracaoLabel=h>0&&m>0?`${h}h ${m}min`:h>0?`${h}h`:m>0?`${m}min`:"";
    onSalvar({...form,duracao:duracaoLabel,id:Date.now()});

  return (
    <Modal title={`Registrar Atividade — ${paciente.nome.split(" ")[0]}`} onClose={onClose} width={540}>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>

          <Select label="Profissional" value={form.profissional} onChange={v=>s("profissional",v)} options={PROFISSIONAIS_TIPOS} placeholder="Selecione" required/>
          <div>
            <label style={{fontSize:11,fontWeight:600,color:C.textMuted,textTransform:"uppercase",letterSpacing:"0.04em",display:"block",marginBottom:4}}>Duração</label>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <input type="number" value={form.horas} onChange={e=>s("horas",e.target.value)} min="0" max="23"
                style={{width:54,padding:"9px 8px",borderRadius:C.radiusXs,border:`1.5px solid ${C.border}`,fontSize:13,fontFamily:"inherit",textAlign:"center",outline:"none"}}/>
              <span style={{fontSize:12,color:C.textMuted,fontWeight:500}}>h</span>
              <input type="number" value={form.minutos} onChange={e=>s("minutos",e.target.value)} min="0" max="59" placeholder="0"
                style={{width:54,padding:"9px 8px",borderRadius:C.radiusXs,border:`1.5px solid ${C.border}`,fontSize:13,fontFamily:"inherit",textAlign:"center",outline:"none"}}/>
              <span style={{fontSize:12,color:C.textMuted,fontWeight:500}}>min</span>
            </div>
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:4}}>
          <label style={{fontSize:11,fontWeight:600,color:C.textMuted,textTransform:"uppercase",letterSpacing:"0.04em"}}>Descrição / Observações</label>
          <textarea value={form.descricao} onChange={e=>s("descricao",e.target.value)} rows={3}
            placeholder="Evolução, procedimentos realizados, intercorrências..."
            style={{padding:"9px 12px",borderRadius:C.radiusXs,border:`1.5px solid ${C.border}`,fontSize:13,fontFamily:"inherit",resize:"vertical",outline:"none",width:"100%",boxSizing:"border-box"}}/>
        </div>
        <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",padding:"10px 12px",borderRadius:C.radiusXs,border:`1.5px solid ${form.intercorrencia?C.dangerBd:C.border}`,background:form.intercorrencia?C.dangerBg:C.surface,transition:"all 0.15s"}}>
          <input type="checkbox" checked={form.intercorrencia} onChange={e=>s("intercorrencia",e.target.checked)} style={{accentColor:C.danger,width:15,height:15,flexShrink:0}}/>

          <Btn onClick={confirmar} variant="primary" size="lg">Salvar Atividade</Btn>

const AltaModal=({paciente,onClose,onConfirm})=>{
  const [dataAlta,setDataAlta]=useState(hoje());
  const [destino,setDestino]=useState("");
  const [destiDetalhe,setDestiDetalhe]=useState("");
  const [obitoDeclarante,setObitoDeclarante]=useState("");
  const [urgMotivo,setUrgMotivo]=useState("");
  const [eletivaDesc,setEletivaDesc]=useState("");
  const [err,setErr]=useState("");

  const needsDetalhe=["UPA","Centro de Saúde"].includes(destino);
  const detalheLista=needsDetalhe?(ORIGEM_DETALHES[destino]==="UPA"?UPA_LIST:CS_LIST):[];

  const handleConfirm=()=>{
    if(!destino){setErr("Selecione o destino."); return;}
    if(destino==="Óbito Domiciliar"&&!obitoDeclarante){setErr("Informe quem declarou o óbito."); return;}
    if(destino==="Internação Hospitalar Urgência"&&!urgMotivo){setErr("Informe o motivo da internação."); return;}
    onConfirm({dataAlta,destino,destiDetalhe,obitoDeclarante,urgMotivo,eletivaDesc,
      novoStatus: destino.startsWith("Óbito")?"obito":"alta"});
  };

  return (
    <Modal title="Registrar Alta / Desfecho" onClose={onClose}>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <Input label="Data do Desfecho" value={dataAlta} onChange={setDataAlta} mask="date" required/>
        <Select label="Destino" value={destino} onChange={v=>{setDestino(v);setDestiDetalhe("");setObitoDeclarante("");setUrgMotivo("");setEletivaDesc("");}}
          options={DESTINO_LISTA} placeholder="Selecione o destino" required/>

        {needsDetalhe&&(
          <Select label="Detalhe do Destino" value={destiDetalhe} onChange={setDestiDetalhe}
            options={destino==="UPA"?UPA_LIST:CS_LIST} placeholder="Selecione"/>
        )}
        {destino==="Óbito Domiciliar"&&(
          <Select label="Quem Declarou o Óbito" value={obitoDeclarante} onChange={setObitoDeclarante}
            options={OBITO_DECLARANTE} placeholder="Selecione" required/>
        )}
        {destino==="Internação Hospitalar Urgência"&&(
          <Select label="Motivo da Internação" value={urgMotivo} onChange={setUrgMotivo}
            options={INTERNACAO_URG_MOTIVOS} placeholder="Selecione o motivo" required/>
        )}
        {destino==="Internação Hospitalar Eletiva"&&(
          <Input label="Descrição" value={eletivaDesc} onChange={setEletivaDesc} placeholder="Descreva a indicação"/>
        )}

        {err&&<div style={{padding:"10px 13px",background:C.dangerBg,borderRadius:C.radiusXs,fontSize:12,color:C.danger,fontWeight:600,border:`1px solid ${C.dangerBd}`}}>{err}</div>}

        <div style={{display:"flex",gap:10,marginTop:4}}>
          <Btn onClick={handleConfirm} variant={destino.startsWith("Óbito")?"danger":"success"} size="lg">
            <span style={{display:"flex",alignItems:"center",gap:6}}>{destino.startsWith("Óbito")?<><Ico name="flag" size={15}/> Registrar Óbito</>:<><Ico name="check" size={15}/> Confirmar Alta</>}</span>
          </Btn>
          <Btn onClick={onClose} variant="secondary">Cancelar</Btn>
        </div>
      </div>
    </Modal>
  );
};

const Dashboard=({pacientes,equipe,role,setPacientes})=>{
  const scopePac=role==="equipe"?pacientes.filter(p=>p.equipe===equipe):pacientes;
  const ativos=scopePac.filter(p=>p.status==="ativo");
  const emAval=scopePac.filter(p=>p.status==="avaliacao");
  const totalDisps=DISPS_KEYS.reduce((s,k)=>s+ativos.filter(p=>p[k]).length,0);

  /* Permanência destaque */
  const diasMedio=ativos.length?
    Math.round(ativos.reduce((s,p)=>{const d=diasAdmitido(p.admissao);return d!=null?s+d:s;},0)/ativos.length):0;

  /* Motoristas census */
  const MOT_ACUM = [420,387,402]; // mock km acumulado no mês por motorista
  const MOT_HORAS_ACUM = [64,58,61]; // mock horas acumuladas
  const [motoristas,setMotoristas]=useState([{nome:"",km:"",horas:""},{nome:"",km:"",horas:""},{nome:"",km:"",horas:""}]);
  const updateMot=(i,field,val)=>setMotoristas(prev=>{const n=[...prev];n[i]={...n[i],[field]:val};return n;});
  const totalKm=motoristas.reduce((s,m)=>s+(parseFloat(m.km)||0),0);
  const totalHoras=motoristas.reduce((s,m)=>s+(parseFloat(m.horas)||0),0);

  /* Transferências pendentes recebidas */
  const transfsRecebidas=pacientes.filter(p=>p.status==="transferencia"&&p.transferenciaDest===equipe);
  const aceitarTransf=useCallback((id)=>{
    setPacientes(prev=>prev.map(p=>p.id===id?{...p,status:"ativo",equipe:p.transferenciaDest,transferenciaOrig:"",transferenciaDest:"",transferenciaNote:""}:p));
  },[setPacientes]);
  const recusarTransf=useCallback((id)=>{
    setPacientes(prev=>prev.map(p=>p.id===id?{...p,status:"ativo",transferenciaOrig:"",transferenciaDest:"",transferenciaNote:""}:p));
  },[setPacientes]);

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
      <PageHeader title={role==="equipe"?equipe:"Dashboard"} breadcrumb={new Date().toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}/>
    <div style={{flex:1,overflowY:"auto",padding:"20px 28px",display:"flex",flexDirection:"column",gap:20}}>

      {/* KPIs */}
      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
        <KPI label="Ativos" value={ativos.length} icon="users" color={C.primary} delta={ativos.length-STATS_ANT.admitidos}/>
        <KPI label="Em Avaliação" value={emAval.length} icon="search" color={C.orange}/>
        <KPI label="Dispositivos e Proc." value={totalDisps} icon="activity" color={C.teal}/>
        <KPI label="Permanência Média" value={`${diasMedio}d`} icon="calendar" color={C.purple}/>

          {[
            {label:"Admitidos",atu:STATS_ATU.admitidos,ant:STATS_ANT.admitidos},
            {label:"Avaliados",atu:STATS_ATU.avaliados,ant:STATS_ANT.avaliados},

                  <div style={{fontSize:11,color:C.textMuted,marginTop:1}}>
                    {idade!=null?`${idade} anos · `:""}Prontuário: {p.id}
                  </div>
                </div>
                <div style={{display:"flex",gap:4,flexWrap:"wrap",justifyContent:"flex-end",maxWidth:180}}>
                  {disps.slice(0,3).map(k=>(
                    <span key={k} style={{fontSize:10,padding:"2px 7px",borderRadius:999,background:C.primaryLt,color:C.primaryDk,fontWeight:600}}>{k}</span>
                  ))}
                  {disps.length>3&&<span style={{fontSize:10,color:C.textMuted}}>+{disps.length-3}</span>}
                </div>
                {dias!=null&&(
                  <div style={{padding:"4px 11px",borderRadius:999,fontWeight:700,fontSize:12,whiteSpace:"nowrap",
                    background:alertDias?C.dangerBg:warnDias?C.orangeBg:C.primaryLt,
                    color:alertDias?C.danger:warnDias?C.orange:C.primaryDk}}>
                    {dias}d
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </Card>

      {/* Transferências recebidas pendentes */}
      {transfsRecebidas.length>0&&(
        <Card style={{padding:18,border:`2px solid ${C.orangeBd}`}}>
          <div style={{fontSize:14,fontWeight:700,color:C.orange,marginBottom:12,display:"flex",alignItems:"center",gap:6}}><Ico name="send" size={15} color={C.orange}/> Transferências Recebidas ({transfsRecebidas.length})</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {transfsRecebidas.map(p=>(
              <div key={p.id} style={{padding:"10px 13px",borderRadius:C.radiusXs,background:C.orangeBg,border:`1px solid ${C.orangeBd}`}}>
                <div style={{fontSize:13,fontWeight:600}}>{p.nome}</div>
                <div style={{fontSize:11,color:C.textSec,margin:"2px 0 8px"}}>
                  De: {p.transferenciaOrig} · {p.transferenciaNote||"Sem observações"}
                </div>
                <div style={{display:"flex",gap:8}}>
                  <Btn variant="success" size="sm" onClick={()=>aceitarTransf(p.id)}><Ico name="check" size={13}/> Aceitar</Btn>
                  <Btn variant="secondary" size="sm" onClick={()=>recusarTransf(p.id)}><Ico name="x" size={13}/> Recusar</Btn>
                </div>
              </div>
            ))}
          </div>
        </Card>
      )}

      {/* Censo Diário — Motoristas */}
      <Card style={{padding:18}}>
        <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:14}}>Censo do Dia — Motoristas em Plantão</div>
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:14}}>
          {motoristas.map((m,i)=>{
            const kmDia=parseFloat(m.km)||0;
            const hDia=parseFloat(m.horas)||0;
            const kmAcum=MOT_ACUM[i]+kmDia;
            const hAcum=MOT_HORAS_ACUM[i]+hDia;
            return (
              <div key={i} style={{padding:"12px 14px",background:C.surfaceAlt,borderRadius:C.radiusXs,border:`1px solid ${C.border}`}}>
                <div style={{fontSize:11,fontWeight:700,color:C.textMuted,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8}}>Motorista {i+1}</div>
                <div style={{display:"flex",gap:10,alignItems:"flex-end",flexWrap:"wrap"}}>
                  <div style={{flex:2,minWidth:140}}>
                    <Input label="Nome do motorista" value={m.nome} onChange={v=>updateMot(i,"nome",v)} placeholder={`Motorista ${i+1}`}/>
                  </div>
                  <div style={{flex:1,minWidth:80}}>
                    <Input label="Km hoje" value={m.km} onChange={v=>updateMot(i,"km",v)} type="number" placeholder="0"/>
                  </div>
                  <div style={{flex:1,minWidth:80}}>
                    <Input label="Horas hoje" value={m.horas} onChange={v=>updateMot(i,"horas",v)} type="number" placeholder="0"/>
                  </div>
                </div>
                <div style={{display:"flex",gap:10,marginTop:8}}>
                  <div style={{flex:1,padding:"8px 10px",background:C.tealBg,borderRadius:C.radiusXs,textAlign:"center"}}>
                    <div style={{fontSize:9,fontWeight:600,color:C.teal,textTransform:"uppercase"}}>Km no mês</div>
                    <div style={{fontSize:16,fontWeight:800,color:C.teal}}>{kmAcum.toFixed(0)}</div>
                    <div style={{fontSize:9,color:C.textMuted}}>hoje: +{kmDia}</div>
                  </div>
                  <div style={{flex:1,padding:"8px 10px",background:C.blueBg,borderRadius:C.radiusXs,textAlign:"center"}}>
                    <div style={{fontSize:9,fontWeight:600,color:C.blue,textTransform:"uppercase"}}>Horas no mês</div>
                    <div style={{fontSize:16,fontWeight:800,color:C.blue}}>{hAcum.toFixed(0)}</div>
                    <div style={{fontSize:9,color:C.textMuted}}>hoje: +{hDia}</div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div style={{padding:"12px 16px",background:C.tealBg,borderRadius:C.radiusXs}}>
            <div style={{fontSize:10,fontWeight:600,color:C.teal,textTransform:"uppercase",letterSpacing:"0.06em"}}>Total Km — 3 Motoristas (mês)</div>
            <div style={{fontSize:22,fontWeight:800,color:C.teal,marginTop:4}}>{(MOT_ACUM.reduce((s,v)=>s+v,0)+totalKm).toFixed(0)} km</div>
            <div style={{fontSize:10,color:C.textMuted,marginTop:2}}>Hoje: +{totalKm.toFixed(0)} km</div>
          </div>
          <div style={{padding:"12px 16px",background:C.blueBg,borderRadius:C.radiusXs}}>
            <div style={{fontSize:10,fontWeight:600,color:C.blue,textTransform:"uppercase",letterSpacing:"0.06em"}}>Total Horas — 3 Motoristas (mês)</div>
            <div style={{fontSize:22,fontWeight:800,color:C.blue,marginTop:4}}>{(MOT_HORAS_ACUM.reduce((s,v)=>s+v,0)+totalHoras).toFixed(0)} h</div>
            <div style={{fontSize:10,color:C.textMuted}}>Hoje: +{totalHoras.toFixed(0)} h</div>
          </div>
        </div>
      </Card>
    </div>
    </div>
  );
};

const EditarPacienteModal=({paciente,onClose,onSalvar})=>{
  const [form,setForm]=useState({
    nome:paciente.nome||"",nascimento:paciente.nascimento||"",sexo:paciente.sexo||"",
    cpf:paciente.cpf||"",telefone:paciente.telefone||"",nomeCuidador:paciente.nomeCuidador||"",
    telCuidador:paciente.telCuidador||"",dataDocumentos:paciente.dataDocumentos||"",
    equipe:paciente.equipe||EQUIPES_LIST[0],motivo:paciente.motivo||"",
    origemTipo:paciente.origemTipo||"",origemDetalhe:paciente.origemDetalhe||"",
    // Dados clínicos
    cid:paciente.cid||"",cidCronico:paciente.cidCronico||"",cidInternacao:paciente.cidInternacao||"",
    perfil:paciente.perfil||"",ad:paciente.ad||"AD1",score:paciente.score||"",
    paliativo:paciente.paliativo||"NÃO",o2Indicacao:paciente.o2Indicacao||"Não",
    comorbidades:paciente.comorbidades||[],
    // Dispositivos
    SVD:!!paciente.SVD,O2:!!paciente.O2,SNE:!!paciente.SNE,GTT:!!paciente.GTT,
    TQT:!!paciente.TQT,VM:!!paciente.VM,Hipodermoclise:!!paciente.Hipodermoclise,
    ATB:!!paciente.ATB,CurativoEsp:!!paciente.CurativoEsp,
    atb1:paciente.atb1||"",atb2:paciente.atb2||"",
  });
  const s=(k,v)=>setForm(f=>({...f,[k]:v}));
  const toggleCom=(c)=>setForm(f=>({...f,comorbidades:f.comorbidades.includes(c)?f.comorbidades.filter(x=>x!==c):[...f.comorbidades,c]}));
  return (
    <Modal title={`Editar Dados — ${paciente.nome}`} onClose={onClose} width={780}>
      <div style={{display:"flex",flexDirection:"column",gap:14,maxHeight:"80vh",overflowY:"auto",paddingRight:4}}>
        <Divider label="Identificação"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div style={{gridColumn:"1/-1"}}><Input label="Nome Completo" value={form.nome} onChange={v=>s("nome",v)} mask="name" required placeholder="Nome completo"/></div>
          <Input label="Data de Nascimento" value={form.nascimento} onChange={v=>s("nascimento",v)} mask="date" placeholder="DD/MM/AAAA"/>
          <Select label="Sexo" value={form.sexo} onChange={v=>s("sexo",v)} options={SEXO_OPTIONS}/>
          <Input label="CPF" value={form.cpf} onChange={v=>s("cpf",v)} mask="cpf" placeholder="000.000.000-00"/>
          <Input label="Telefone do Paciente" value={form.telefone} onChange={v=>s("telefone",v)} mask="phone"/>
          <Input label="Nome do Cuidador" value={form.nomeCuidador} onChange={v=>s("nomeCuidador",v)} placeholder="Nome completo"/>
          <Input label="Telefone do Cuidador" value={form.telCuidador} onChange={v=>s("telCuidador",v)} mask="phone"/>
          <Input label="Data dos Documentos" value={form.dataDocumentos} onChange={v=>s("dataDocumentos",v)} mask="date" placeholder="DD/MM/AAAA"/>
          <Select label="Equipe" value={form.equipe} onChange={v=>s("equipe",v)} options={EQUIPES_LIST}/>
        </div>
        <Divider label="Origem"/>
        <OrigemSelector origemTipo={form.origemTipo} origemDetalhe={form.origemDetalhe}
          onChange={(t,d)=>setForm(f=>({...f,origemTipo:t,origemDetalhe:d}))}/>
        <div>
          <div style={{fontSize:11,fontWeight:600,color:C.textSec,marginBottom:6}}>Motivo do Encaminhamento</div>
          <textarea value={form.motivo} onChange={e=>s("motivo",e.target.value)} rows={2}
            style={{width:"100%",padding:"9px 11px",borderRadius:C.radiusXs,border:`1.5px solid ${C.border}`,fontSize:12,fontFamily:"inherit",resize:"vertical",outline:"none",boxSizing:"border-box"}}/>
        </div>
        <Divider label="Perfil Clínico"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:12}}>
          <Select label="Classificação AD" value={form.ad} onChange={v=>s("ad",v)} options={AD_OPTIONS}/>
          <Input label="CID Principal" value={form.cid} onChange={v=>s("cid",v)} mask="cid" placeholder="J44.1"/>
          <Input label="CID Crônico" value={form.cidCronico} onChange={v=>s("cidCronico",v)} mask="cid" placeholder="J44.0"/>
          <Input label="CID Internação" value={form.cidInternacao} onChange={v=>s("cidInternacao",v)} mask="cid" placeholder=""/>
          <div style={{gridColumn:"1/-1"}}>
            <Select label="Perfil Epidemiológico / Doença Base" value={form.perfil} onChange={v=>s("perfil",v)} options={DOENCAS_LIST} placeholder="Selecione"/>
          </div>
          <Input label="Score Clínico" value={form.score} onChange={v=>s("score",v)} type="number" placeholder="0"/>
          <Select label="Indicação O₂" value={form.o2Indicacao} onChange={v=>s("o2Indicacao",v)} options={O2_OPTIONS}/>
          <Select label="Cuidados Paliativos" value={form.paliativo} onChange={v=>s("paliativo",v)} options={PALIATIVO_OPTIONS}/>
        </div>
        <Divider label="Comorbidades / DCNTs"/>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {COMORBIDADES_LIST.map(c=>(
            <button key={c} onClick={()=>toggleCom(c)}
              style={{padding:"4px 11px",borderRadius:999,fontSize:11,fontWeight:600,cursor:"pointer",border:`1.5px solid ${form.comorbidades.includes(c)?C.primary:C.border}`,background:form.comorbidades.includes(c)?C.primaryLt:C.surface,color:form.comorbidades.includes(c)?C.primaryDk:C.textSec,fontFamily:"inherit"}}>
              {c}
            </button>
          ))}
        </div>
        <Divider label="Dispositivos e Procedimentos"/>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(170px,1fr))",gap:7}}>
          {DISPS_KEYS.map(k=>(
            <Toggle key={k} label={DISPS_LABELS[k]} icon={DISPS_ICONS[k]} checked={form[k]} onChange={v=>s(k,v)}/>
          ))}
        </div>
        {form.ATB&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,padding:"12px",background:C.orangeBg,borderRadius:C.radiusSm,border:`1px solid ${C.orangeBd}`}}>
            <Select label="ATB 1" value={form.atb1} onChange={v=>s("atb1",v)} options={ATB_LIST}/>
            <Select label="ATB 2" value={form.atb2} onChange={v=>s("atb2",v)} options={["—",...ATB_LIST.filter(x=>x!=="—")]}/>
          </div>
        )}
        <div style={{display:"flex",gap:10,marginTop:4}}>
          <Btn variant="success" onClick={()=>onSalvar(form)}><Ico name="check" size={14}/> Salvar Alterações</Btn>
          <Btn variant="secondary" onClick={onClose}>Cancelar</Btn>
        </div>
      </div>
    </Modal>
  );
};

/* ══════════════════════════════════════════════════════
   ABA PACIENTES
══════════════════════════════════════════════════════ */
const PacientesList=({pacientes,equipe,role,setPacientes,userEmail,statusFiltro})=>{
  const [busca,setBusca]=useState("");
  const [filtro,setFiltro]=useState("todos");
  const [expandido,setExpandido]=useState(null);
  const [altaAlvo,setAltaAlvo]=useState(null);
  const [transferAlvo,setTransferAlvo]=useState(null);
  const [tabPac,setTabPac]=useState({});
  const [atividadeAlvo,setAtividadeAlvo]=useState(null);
  const [avalNotaAlvo,setAvalNotaAlvo]=useState(null);
  const [editAlvo,setEditAlvo]=useState(null);
  const [teleforms,setTeleforms]=useState({}); // {id:{data,hora,anotacao}}
  const [visao,setVisao]=useState("ativos"); // "ativos" | "historico" — only when !statusFiltro

  const lista=useMemo(()=>{
    const base=role==="equipe"?pacientes.filter(p=>p.equipe===equipe):pacientes;
    let sf;
    if(statusFiltro) sf=statusFiltro;
    else sf=visao==="ativos"?["ativo","avaliacao"]:["alta","obito","negativa","transferencia"];
    return base
      .filter(p=>{
        const inSf=sf.includes(p.status);
        const q=busca.toLowerCase();
        const mb=!busca||p.id.toLowerCase().includes(q)||p.nome.toLowerCase().includes(q)||(p.cid||"").toLowerCase().includes(q);
        return inSf&&(filtro==="todos"||p.status===filtro)&&mb;
      })
      .sort((a,b)=>a.nome.localeCompare(b.nome,"pt-BR"));
  },[pacientes,equipe,role,filtro,busca,visao,statusFiltro]);

  const handleAlta=(p)=>setAltaAlvo(p);
  const confirmarAlta=(p,dadosAlta)=>{
    setPacientes(prev=>prev.map(x=>x.id===p.id?{...x,status:dadosAlta.novoStatus,...dadosAlta}:x));
    setAltaAlvo(null); setExpandido(null);
  };
  const handleTransfer=(p)=>setTransferAlvo(p);
  const enviarTransfer=(id,dest,note)=>{
    setPacientes(prev=>prev.map(p=>p.id===id?{...p,status:"transferencia",transferenciaDest:dest,transferenciaOrig:equipe,transferenciaNote:note}:p));
    setTransferAlvo(null);
  };
  const salvarAtividade=(pac,ativ)=>{
    setPacientes(prev=>prev.map(p=>p.id===pac.id?{...p,atividades:[...(p.atividades||[]),ativ]}:p));
    setAtividadeAlvo(null);
  };
  const salvarAvalNota=(pac,nota)=>{
    setPacientes(prev=>prev.map(p=>p.id===pac.id?{...p,avaliacaoNota:nota}:p));
    setAvalNotaAlvo(null);
  };
  const salvarEdit=(pac,dados)=>{
    setPacientes(prev=>prev.map(p=>p.id===pac.id?{...p,...dados}:p));
    setEditAlvo(null);
  };

  const filtroLabels=statusFiltro
    ?{todos:"Todos",...Object.fromEntries(statusFiltro.map(s=>[s,STATUS_MAP[s]?.label||s]))}
    :visao==="ativos"
    ?{todos:"Todos",ativo:"Ativos",avaliacao:"Em Avaliação"}
    :{todos:"Todos",alta:"Alta",obito:"Óbito",negativa:"Não Elegível",transferencia:"Transferência"};

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
      <PageHeader title="Pacientes" breadcrumb="Home › Pacientes"/>

      {/* KPIs rápidos */}
      <div style={{padding:"16px 24px",borderBottom:`1px solid ${C.border}`,display:"flex",gap:12,background:C.surface}}>
        {[
          {label:"Pacientes na visão",v:lista.length,icon:"users",color:C.primary},
          {label:"Ativos",v:pacientes.filter(p=>(role==="equipe"?p.equipe===equipe:true)&&p.status==="ativo").length,icon:"check",color:C.success},
          {label:"Em Avaliação",v:pacientes.filter(p=>(role==="equipe"?p.equipe===equipe:true)&&p.status==="avaliacao").length,icon:"search",color:C.orange},
          {label:"Alta / Óbito",v:pacientes.filter(p=>(role==="equipe"?p.equipe===equipe:true)&&["alta","obito"].includes(p.status)).length,icon:"history",color:C.purple},
        ].map(({label,v,icon,color})=>(
          <div key={label} style={{flex:1,padding:"12px 16px",borderRadius:C.radiusSm,border:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:36,height:36,borderRadius:C.radiusSm,background:color+"18",display:"flex",alignItems:"center",justifyContent:"center"}}><Ico name={icon} size={16} color={color} sw={1.7}/></div>
            <div>
              <div style={{fontSize:11,color:C.textMuted,fontWeight:500}}>{label}</div>
              <div style={{fontSize:22,fontWeight:800,color:color,lineHeight:1.1}}>{v}</div>
            </div>
          </div>
        ))}
      </div>

      {/* Visão tabs — only when não há statusFiltro (ex: coordenação) */}
      {!statusFiltro&&(
      <div style={{padding:"0 24px",background:C.surface,borderBottom:`1px solid ${C.border}`,display:"flex",gap:0}}>
        {[["ativos","Ativos e Em Avaliação","users"],["historico","Histórico (Alta / Óbito)","history"]].map(([v,lbl,ic])=>(
          <button key={v} onClick={()=>{setVisao(v);setFiltro("todos");}}
            style={{display:"flex",alignItems:"center",gap:7,padding:"12px 18px",border:"none",
              borderBottom:visao===v?`2px solid ${C.primary}`:"2px solid transparent",
              background:"transparent",cursor:"pointer",fontSize:13,fontWeight:visao===v?700:400,
              color:visao===v?C.primaryDk:C.textMuted,fontFamily:"inherit",transition:"all 0.12s"}}>
            <Ico name={ic} size={14} color={visao===v?C.primaryDk:C.textMuted}/>
            {lbl}
          </button>
        ))}
      </div>
      )}

      {/* Busca + filtros */}
      <div style={{padding:"12px 24px",background:C.surface,borderBottom:`1px solid ${C.border}`,display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
        <div style={{position:"relative",flex:1,minWidth:220}}>
          <span style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",pointerEvents:"none",display:"flex"}}><Ico name="search" size={14} color={C.textMuted}/></span>
          <input value={busca} onChange={e=>setBusca(e.target.value)}
            placeholder="Buscar por nome, prontuário ou CID..."
            style={{width:"100%",padding:"8px 12px 8px 34px",borderRadius:C.radiusSm,
              border:`1.5px solid ${C.border}`,fontSize:13,fontFamily:"inherit",outline:"none",background:C.surface,boxSizing:"border-box"}}/>
        </div>
        <Select label="" value={filtro} onChange={setFiltro}
          options={Object.entries(filtroLabels).map(([k,v])=>({value:k,label:v}))}/>
      </div>

      {/* Tabela */}
      <div style={{flex:1,overflowY:"auto",padding:"0 24px 24px"}}>
        <div style={{fontSize:11,color:C.textMuted,padding:"10px 0 6px"}}>{lista.length} registro(s) · ordem alfabética</div>
        <Card style={{overflow:"hidden",padding:0}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead>
              <tr style={{background:C.surfaceAlt,borderBottom:`1px solid ${C.border}`}}>
                {["PACIENTE","PRONTUÁRIO","ADMISSÃO","STATUS","AD","AÇÕES"].map(h=>(
                  <th key={h} style={{padding:"10px 16px",textAlign:"left",fontSize:10,fontWeight:600,color:C.textMuted,letterSpacing:"0.06em",whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {lista.length===0&&(
                <tr><td colSpan={6} style={{padding:"40px",textAlign:"center",color:C.textMuted,fontSize:13}}>Nenhum paciente encontrado</td></tr>
              )}
              {lista.map(p=>{
                const exp=expandido===p.id;
                const dias=diasAdmitido(p.admissao);
                const idade=calcIdade(p.nascimento);
                const disps=DISPS_KEYS.filter(k=>p[k]);
                const tab=tabPac[p.id]||"dados";
                const alertDias=dias!=null&&dias>60;
                const warnDias=dias!=null&&dias>30&&dias<=60;
                const bg=avatarColor(p.nome);
                return (
                  <React.Fragment key={p.id}>
                    <tr style={{borderBottom:`1px solid ${C.border}`,cursor:"pointer",transition:"background 0.1s"}}

                      <td style={{padding:"12px 16px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:10}}>
                          <div style={{width:36,height:36,borderRadius:"50%",background:bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,color:"#fff",flexShrink:0}}>
                            {initials(p.nome)}
                          </div>
                          <div>
                            <div style={{fontSize:13,fontWeight:600,color:C.text}}>{p.nome}</div>
                            <div style={{fontSize:11,color:C.textMuted,marginTop:1}}>
                              {idade!=null?`${idade} anos`:"—"} · {p.sexo||"—"}
                            </div>
                          </div>
                        </div>
                      </td>
                      <td style={{padding:"12px 16px"}}>
                        <span style={{padding:"3px 8px",borderRadius:C.radiusXs,background:C.neutralBg,border:`1px solid ${C.border}`,fontSize:11,fontWeight:600,color:C.textSec,fontFamily:"monospace"}}>{p.id}</span>
                      </td>
                      <td style={{padding:"12px 16px"}}>
                        {p.admissao
                          ?<div>
                              <div style={{fontSize:12,color:C.text}}>{p.admissao}</div>

                          :<span style={{fontSize:12,color:C.textMuted}}>—</span>}
                      </td>
                      <td style={{padding:"12px 16px"}}><Badge status={p.status}/></td>
                      <td style={{padding:"12px 16px"}}>{p.ad?<AdBadge val={p.ad}/>:<span style={{color:C.textMuted,fontSize:12}}>—</span>}</td>
                      <td style={{padding:"12px 16px"}}>
                        <div style={{display:"flex",gap:6}} onClick={e=>e.stopPropagation()}>
                          <button title="Ver detalhes" onClick={()=>setExpandido(exp?null:p.id)}
                            style={{width:30,height:30,borderRadius:C.radiusXs,border:`1px solid ${C.border}`,background:exp?C.primaryLt:C.surface,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                            <Ico name="eye" size={14} color={exp?C.primary:C.textMuted}/>
                          </button>
                          {p.status==="ativo"&&(
                            <>
                              {role==="equipe"&&(
                              <button title="Editar dados" onClick={()=>setEditAlvo(p)}
                                style={{width:30,height:30,borderRadius:C.radiusXs,border:`1px solid ${C.border}`,background:C.surface,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                                <Ico name="pencil" size={14} color={C.textSec}/>
                              </button>
                              )}
                              <button title="Registrar atividade" onClick={()=>setAtividadeAlvo(p)}
                                style={{width:30,height:30,borderRadius:C.radiusXs,border:`1px solid ${C.border}`,background:C.surface,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                                <Ico name="activity" size={14} color={C.primary}/>
                              </button>
                              <button title="Alta / Desfecho" onClick={()=>handleAlta(p)}
                                style={{width:30,height:30,borderRadius:C.radiusXs,border:`1px solid ${C.dangerBd}`,background:C.dangerBg,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                                <Ico name="flag" size={14} color={C.danger}/>
                              </button>
                              <button title="Transferir" onClick={()=>handleTransfer(p)}
                                style={{width:30,height:30,borderRadius:C.radiusXs,border:`1px solid ${C.orangeBd}`,background:C.orangeBg,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                                <Ico name="send" size={14} color={C.orange}/>
                              </button>
                            </>
                          )}
                          {p.status==="avaliacao"&&(
                            <>
                              <button title="Registrar nota de avaliação" onClick={()=>setAvalNotaAlvo(p)}
                                style={{width:30,height:30,borderRadius:C.radiusXs,border:`1px solid ${C.border}`,background:C.surface,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                                <Ico name="note" size={14} color={C.primary}/>
                              </button>
                              <button title="Registrar atividade / ida ao leito" onClick={()=>setAtividadeAlvo(p)}
                                style={{width:30,height:30,borderRadius:C.radiusXs,border:`1px solid ${C.border}`,background:C.surface,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                                <Ico name="pencil" size={14} color={C.teal}/>
                              </button>
                              <button title="Registrar Desfecho" onClick={()=>handleAlta(p)}
                                style={{width:30,height:30,borderRadius:C.radiusXs,border:`1px solid ${C.successBd}`,background:C.successBg,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                                <Ico name="check" size={14} color={C.success}/>
                              </button>
                            </>
                          )}
                        </div>
                      </td>
                    </tr>

                    {exp&&(
                      <tr>
                        <td colSpan={6} style={{padding:0,borderBottom:`2px solid ${C.primary}22`}}>
                          <div style={{background:C.surfaceAlt,borderTop:`2px solid ${C.primary}`}}>
                            {/* Tabs */}
                            <div style={{display:"flex",gap:0,borderBottom:`1px solid ${C.border}`,background:C.surface}}>
                              {[
                                ["dados","Dados","note"],
                                ["disps","Dispositivos","activity"],
                                ["ativ",`Atividades (${(p.atividades||[]).length})`,"clock"],
                                p.status==="avaliacao"?["aval","Nota de Avaliação","clipboard"]:null,
                                ["tele","Telemonitoramento","send"],
                              ].filter(Boolean).map(([k,lbl,ic])=>(
                                <button key={k} onClick={()=>setTabPac(prev=>({...prev,[p.id]:k}))}
                                  style={{display:"flex",alignItems:"center",gap:6,padding:"10px 14px",border:"none",borderBottom:tab===k?`2px solid ${C.primary}`:"2px solid transparent",
                                    background:"transparent",cursor:"pointer",fontSize:12,fontWeight:tab===k?700:400,
                                    color:tab===k?C.primaryDk:C.textMuted,fontFamily:"inherit",transition:"color 0.12s"}}>
                                  <Ico name={ic} size={13} color={tab===k?C.primaryDk:C.textMuted}/>{lbl}
                                </button>
                              ))}
                              <div style={{flex:1}}/>
                              {(p.status==="ativo"||p.status==="avaliacao")&&(
                                <div style={{padding:"6px 12px",display:"flex",gap:8,alignItems:"center"}}>
                                  {p.status==="avaliacao"&&<Btn variant="secondary" size="sm" onClick={()=>setAvalNotaAlvo(p)}>Nota de Avaliação</Btn>}
                                  <Btn variant="primary" size="sm" onClick={()=>setAtividadeAlvo(p)}>+ Registrar Atividade</Btn>
                                </div>
                              )}
                            </div>

                            <div style={{padding:"16px 20px"}}>
                              {tab==="dados"&&(
                                <div style={{display:"flex",flexDirection:"column",gap:14}}>
                                  <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
                                    {[["Prontuário",p.id],["Nascimento",p.nascimento],["Sexo",p.sexo||"—"],["CPF",p.cpf||"—"],
                                      ["Telefone",p.telefone||"—"],["Cuidador",p.nomeCuidador||"—"],
                                      ["Tel. Cuidador",p.telCuidador||"—"],["Docs. Recebidos",p.dataDocumentos||"—"],
                                    ].map(([l,v])=>(
                                      <div key={l}><div style={{fontSize:10,fontWeight:600,color:C.textMuted,textTransform:"uppercase",letterSpacing:"0.05em"}}>{l}</div>
                                      <div style={{fontSize:12,color:C.text,marginTop:2,fontWeight:500}}>{v}</div></div>
                                    ))}
                                  </div>
                                  <Divider label="Perfil Clínico"/>
                                  <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
                                    {[["CID Principal",p.cid||"—"],["CID Crônico",p.cidCronico||"—"],["CID Internação",p.cidInternacao||"—"],["Score",p.score||"—"],
                                      ["Perfil Epidemiológico",p.perfil||"—"],["Cuidados Paliativos",p.paliativo||"NÃO"],["O₂ Indicação",p.o2Indicacao||"—"],["Origem",`${p.origem||"—"}${p.origemDetalhe?" — "+p.origemDetalhe:""}`],
                                    ].map(([l,v])=>(
                                      <div key={l}><div style={{fontSize:10,fontWeight:600,color:C.textMuted,textTransform:"uppercase",letterSpacing:"0.05em"}}>{l}</div>
                                      <div style={{fontSize:12,color:C.text,marginTop:2,fontWeight:500}}>{v}</div></div>
                                    ))}
                                  </div>
                                  {p.comorbidades?.length>0&&(
                                    <div>
                                      <div style={{fontSize:10,fontWeight:600,color:C.textMuted,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:7}}>Comorbidades / DCNTs</div>
                                      <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                                        {p.comorbidades.map(c=>(<span key={c} style={{padding:"3px 9px",borderRadius:999,background:C.neutralBg,border:`1px solid ${C.border}`,fontSize:11,fontWeight:600}}>{c}</span>))}
                                      </div>
                                    </div>
                                  )}
                                  <div><div style={{fontSize:10,fontWeight:600,color:C.textMuted,textTransform:"uppercase",letterSpacing:"0.05em"}}>Motivo de Encaminhamento</div>
                                  <div style={{fontSize:12,color:C.text,marginTop:2}}>{p.motivo||"—"}</div></div>
                                </div>
                              )}

                              {tab==="disps"&&(
                                <div style={{display:"flex",flexDirection:"column",gap:12}}>
                                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:6}}>
                                    {DISPS_KEYS.map(k=>(
                                      <div key={k} style={{padding:"10px 12px",borderRadius:C.radiusXs,
                                        border:`1.5px solid ${p[k]?C.primary:C.border}`,
                                        background:p[k]?C.primaryLt:C.surface}}>
                                        <div style={{fontSize:12,fontWeight:p[k]?600:400,color:p[k]?C.primaryDk:C.textMuted}}>{DISPS_ICONS[k]} {DISPS_LABELS[k]}</div>
                                        <div style={{fontSize:10,color:p[k]?C.primary:C.neutral,fontWeight:600,marginTop:3}}>{p[k]?"ATIVO":"INATIVO"}</div>
                                      </div>
                                    ))}
                                  </div>
                                  {p.ATB&&(
                                    <div style={{padding:"12px 14px",background:C.orangeBg,borderRadius:C.radiusXs,border:`1px solid ${C.orangeBd}`}}>
                                      <div style={{fontSize:11,fontWeight:700,color:C.brown}}>ANTIBIOTICOTERAPIA PARENTERAL</div>
                                      <div style={{fontSize:13,marginTop:4}}>ATB 1: <strong>{p.atb1||"—"}</strong></div>
                                      {p.atb2&&<div style={{fontSize:13}}>ATB 2: <strong>{p.atb2}</strong></div>}
                                    </div>
                                  )}
                                </div>
                              )}

                              {tab==="ativ"&&(
                                <div style={{display:"flex",flexDirection:"column",gap:12}}>
                                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                                    <div style={{fontSize:13,fontWeight:600,color:C.text}}>Histórico de Atividades</div>
                                    {(p.status==="ativo"||p.status==="avaliacao")&&<Btn variant="primary" size="sm" onClick={()=>setAtividadeAlvo(p)}>+ Nova Atividade</Btn>}
                                  </div>
                                  {(!p.atividades||p.atividades.length===0)
                                    ?<div style={{padding:"24px",textAlign:"center",color:C.textMuted,fontSize:13,background:C.surface,borderRadius:C.radiusSm,border:`1px dashed ${C.border}`}}>
                                        Nenhuma atividade registrada.<br/>
                                        <span style={{fontSize:11}}>Clique em "+ Nova Atividade" para registrar visitas e procedimentos.</span>
                                      </div>
                                    :<div style={{display:"flex",flexDirection:"column",gap:6}}>
                                        {[...(p.atividades||[])].reverse().map((a,i)=>(
                                          <div key={a.id||i} style={{padding:"10px 14px",borderRadius:C.radiusSm,background:C.surface,border:`1px solid ${a.intercorrencia?C.dangerBd:C.border}`,display:"flex",gap:12,alignItems:"flex-start"}}>
                                            <div style={{width:8,height:8,borderRadius:"50%",background:a.intercorrencia?C.danger:C.success,flexShrink:0,marginTop:4}}/>
                                            <div style={{flex:1}}>
                                              <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                                                <span style={{fontSize:12,fontWeight:700,color:C.text}}>{a.tipo}</span>
                                                <span style={{fontSize:11,color:C.textMuted}}>· {a.profissional}</span>
                                                {a.intercorrencia&&<span style={{fontSize:10,padding:"1px 7px",borderRadius:999,background:C.dangerBg,color:C.danger,fontWeight:600}}>INTERCORRÊNCIA</span>}
                                                <span style={{fontSize:11,color:C.textMuted,marginLeft:"auto"}}>{a.data}{a.duracao?` · ${a.duracao}min`:""}</span>
                                              </div>
                                              {a.descricao&&<div style={{fontSize:12,color:C.textSec,marginTop:4}}>{a.descricao}</div>}
                                            </div>
                                          </div>
                                        ))}
                                      </div>
                                  }
                                </div>
                              )}

                              {tab==="aval"&&(
                                <div style={{display:"flex",flexDirection:"column",gap:14}}>
                                  {!p.avaliacaoNota
                                    ?<div style={{padding:"24px",textAlign:"center",color:C.textMuted,border:`1px dashed ${C.border}`,borderRadius:C.radiusSm}}>
                                        Nenhuma nota de avaliação registrada.
                                        <div style={{marginTop:10}}><Btn variant="primary" size="sm" onClick={()=>setAvalNotaAlvo(p)}>Preencher Nota</Btn></div>
                                      </div>
                                    :<div style={{display:"flex",flexDirection:"column",gap:10}}>
                                        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
                                          {[["Data de conhecimento",p.avaliacaoNota.dataConhecimento||"—"],["Leito",p.avaliacaoNota.leito||"—"],["AIH",p.avaliacaoNota.aih||"—"],["Idas ao leito",p.avaliacaoNota.idasLeito??0],].map(([l,v])=>(
                                            <div key={l}><div style={{fontSize:10,fontWeight:600,color:C.textMuted,textTransform:"uppercase"}}>{l}</div><div style={{fontSize:13,color:C.text,marginTop:2,fontWeight:500}}>{v}</div></div>
                                          ))}
                                        </div>
                                        {p.avaliacaoNota.hipotese&&<div><div style={{fontSize:10,fontWeight:600,color:C.textMuted,textTransform:"uppercase"}}>Hipótese Diagnóstica</div><div style={{fontSize:13,color:C.text,marginTop:2}}>{p.avaliacaoNota.hipotese}</div></div>}
                                        {p.avaliacaoNota.motivoNaoAdm&&<div style={{padding:"10px 12px",background:C.orangeBg,borderRadius:C.radiusXs,border:`1px solid ${C.orangeBd}`}}><div style={{fontSize:10,fontWeight:600,color:C.brown,textTransform:"uppercase",marginBottom:4}}>Motivo da Não Admissão</div><div style={{fontSize:12,color:C.text}}>{p.avaliacaoNota.motivoNaoAdm}</div></div>}
                                        {p.avaliacaoNota.observacao&&<div><div style={{fontSize:10,fontWeight:600,color:C.textMuted,textTransform:"uppercase"}}>Observação</div><div style={{fontSize:13,color:C.text,marginTop:2}}>{p.avaliacaoNota.observacao}</div></div>}
                                        <Btn variant="secondary" size="sm" onClick={()=>setAvalNotaAlvo(p)}>Editar Nota</Btn>
                                      </div>
                                  }
                                </div>
                              )}

                              {tab==="tele"&&(()=>{
                                const ligacoes=p.ligacoes||[];
                                const teleF=teleforms[p.id]||{data:hoje(),hora:"",anotacao:""};
                                const setTeleF=(k,v)=>setTeleforms(prev=>({...prev,[p.id]:{...(prev[p.id]||{data:hoje(),hora:"",anotacao:""}),[k]:v}}));
                                const salvarLig=()=>{
                                  if(!teleF.hora.trim()){alert("Informe o horário da ligação.");return;}
                                  const nova={id:Date.now(),data:teleF.data||hoje(),hora:teleF.hora,anotacao:teleF.anotacao};
                                  setPacientes(prev=>prev.map(x=>x.id===p.id?{...x,ligacoes:[...(x.ligacoes||[]),nova]}:x));
                                  setTeleforms(prev=>({...prev,[p.id]:{data:hoje(),hora:"",anotacao:""}}));
                                };
                                return (
                                  <div style={{display:"flex",flexDirection:"column",gap:14}}>
                                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                                      <div style={{fontSize:13,fontWeight:600,color:C.text}}>Registro de Ligações ({ligacoes.length})</div>
                                    </div>
                                    {/* Formulário nova ligação */}
                                    <div style={{padding:"14px",background:C.surfaceAlt,borderRadius:C.radiusSm,border:`1px solid ${C.border}`}}>
                                      <div style={{fontSize:11,fontWeight:700,color:C.textMuted,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>Registrar Nova Ligação</div>
                                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
                                        <Input label="Data" value={teleF.data} onChange={v=>setTeleF("data",v)} mask="date" placeholder="DD/MM/AAAA"/>
                                        <Input label="Hora" value={teleF.hora} onChange={v=>setTeleF("hora",v)} placeholder="HH:MM" required/>
                                      </div>
                                      <div style={{marginBottom:10}}>
                                        <div style={{fontSize:11,fontWeight:600,color:C.textSec,marginBottom:5}}>Anotações da Ligação</div>
                                        <textarea value={teleF.anotacao} onChange={e=>setTeleF("anotacao",e.target.value)}
                                          placeholder="Situação clínica, queixas, orientações realizadas..."
                                          rows={3} style={{width:"100%",padding:"9px 11px",borderRadius:C.radiusXs,border:`1.5px solid ${C.border}`,fontSize:12,fontFamily:"inherit",resize:"vertical",outline:"none",boxSizing:"border-box"}}/>
                                      </div>
                                      <Btn size="sm" onClick={salvarLig}><Ico name="check" size={13}/> Salvar Ligação</Btn>
                                    </div>
                                    {/* Histórico de ligações */}
                                    {ligacoes.length===0
                                      ?<div style={{padding:"20px",textAlign:"center",color:C.textMuted,border:`1px dashed ${C.border}`,borderRadius:C.radiusSm,fontSize:13}}>Nenhuma ligação registrada.</div>
                                      :<div style={{display:"flex",flexDirection:"column",gap:6}}>
                                          {[...ligacoes].reverse().map((l,i)=>(
                                            <div key={l.id||i} style={{padding:"10px 13px",borderRadius:C.radiusSm,background:C.surface,border:`1px solid ${C.border}`,fontSize:12}}>
                                              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                                                <div style={{display:"flex",alignItems:"center",gap:8}}>
                                                  <Ico name="send" size={13} color={C.teal}/>
                                                  <span style={{fontWeight:700,color:C.text}}>{l.data}</span>
                                                  <span style={{color:C.textMuted}}>às {l.hora}</span>
                                                </div>
                                              </div>
                                              {l.anotacao&&<div style={{color:C.textSec,marginTop:4}}>{l.anotacao}</div>}
                                            </div>
                                          ))}
                                        </div>
                                    }
                                  </div>
                                );
                              })()}
                            </div>
                          </div>
                        </td>
                      </tr>
                    )}
                  </React.Fragment>
                );
              })}
            </tbody>
          </table>
        </Card>
      </div>

      {avalNotaAlvo&&<AvaliacaoNotaModal paciente={avalNotaAlvo} onClose={()=>setAvalNotaAlvo(null)} onSalvar={(n)=>salvarAvalNota(avalNotaAlvo,n)}/>}
      {editAlvo&&<EditarPacienteModal paciente={editAlvo} onClose={()=>setEditAlvo(null)} onSalvar={(d)=>salvarEdit(editAlvo,d)}/>}
      {atividadeAlvo&&<AtividadeModal paciente={atividadeAlvo} onClose={()=>setAtividadeAlvo(null)} onSalvar={(a)=>salvarAtividade(atividadeAlvo,a)}/>}
      {altaAlvo&&<AltaModal paciente={altaAlvo} onClose={()=>setAltaAlvo(null)} onConfirm={(d)=>confirmarAlta(altaAlvo,d)}/>}
      {transferAlvo&&<TransferenciaModal paciente={transferAlvo} userEquipe={equipe} onClose={()=>setTransferAlvo(null)} onEnviar={enviarTransfer}/>}
    </div>
  );
};

/* ══════════════════════════════════════════════════════
   ENCAMINHAMENTOS — transferências entre EMADs
══════════════════════════════════════════════════════ */
const EncaminhamentosView=({pacientes,setPacientes,equipe})=>{
  const [transferAlvo,setTransferAlvo]=useState(null);
  const recebidos=pacientes.filter(p=>p.status==="transferencia"&&p.transferenciaDest===equipe);
  const enviados=pacientes.filter(p=>p.status==="transferencia"&&p.transferenciaOrig===equipe);
  const ativosEquipe=pacientes.filter(p=>p.status==="ativo"&&p.equipe===equipe);

  const aceitar=(id)=>setPacientes(prev=>prev.map(p=>p.id===id?{...p,status:"ativo",equipe:p.transferenciaDest,transferenciaOrig:"",transferenciaDest:"",transferenciaNote:""}:p));
  const recusar=(id)=>setPacientes(prev=>prev.map(p=>p.id===id?{...p,status:"ativo",transferenciaOrig:"",transferenciaDest:"",transferenciaNote:""}:p));
  const cancelar=(id)=>setPacientes(prev=>prev.map(p=>p.id===id?{...p,status:"ativo",transferenciaOrig:"",transferenciaDest:"",transferenciaNote:""}:p));
  const enviarTransfer=(id,dest,note)=>{
    setPacientes(prev=>prev.map(p=>p.id===id?{...p,status:"transferencia",transferenciaDest:dest,transferenciaOrig:equipe,transferenciaNote:note}:p));
    setTransferAlvo(null);
  };

  const CardPac=({p,children})=>(
    <div style={{padding:"13px 16px",borderRadius:C.radiusSm,background:C.surfaceAlt,border:`1px solid ${C.border}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
        <div>
          <div style={{fontSize:13,fontWeight:700,color:C.text}}>{p.nome}</div>
          <div style={{fontSize:11,color:C.textMuted,marginTop:2}}>Prontuário: {p.id} · {p.equipe}</div>
          {p.transferenciaNote&&<div style={{fontSize:11,color:C.textSec,marginTop:2}}>Obs: {p.transferenciaNote}</div>}
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>{children}</div>
      </div>
    </div>
  );

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
      <PageHeader title="Encaminhamentos" breadcrumb="Transferências entre EMADs"/>
      <div style={{flex:1,overflowY:"auto",padding:"20px 28px",display:"flex",flexDirection:"column",gap:20}}>

        {/* KPIs */}
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          {[
            {label:"Recebidos pendentes",v:recebidos.length,color:C.orange},
            {label:"Enviados aguardando",v:enviados.length,color:C.purple},
            {label:"Ativos disponíveis",v:ativosEquipe.length,color:C.success},
          ].map(({label,v,color})=>(
            <div key={label} style={{flex:1,minWidth:140,padding:"14px 18px",borderRadius:C.radiusSm,background:C.surface,border:`1px solid ${C.border}`,boxShadow:C.shadow}}>
              <div style={{fontSize:10,fontWeight:600,color:C.textMuted,textTransform:"uppercase",letterSpacing:"0.08em"}}>{label}</div>
              <div style={{fontSize:28,fontWeight:800,color,marginTop:4}}>{v}</div>
            </div>
          ))}
        </div>

        {/* Recebidos */}
        <Card style={{padding:18,border:recebidos.length>0?`2px solid ${C.orangeBd}`:`1px solid ${C.border}`}}>
          <div style={{fontSize:14,fontWeight:700,color:C.orange,marginBottom:12,display:"flex",alignItems:"center",gap:7}}>
            <Ico name="send" size={16} color={C.orange}/> Transferências Recebidas ({recebidos.length})
          </div>
          {recebidos.length===0
            ?<div style={{color:C.textMuted,fontSize:13,padding:"12px 0"}}>Nenhuma transferência recebida pendente.</div>
            :<div style={{display:"flex",flexDirection:"column",gap:8}}>
              {recebidos.map(p=>(
                <CardPac key={p.id} p={p}>
                  <span style={{fontSize:11,color:C.textSec}}>De: <strong>{p.transferenciaOrig}</strong></span>
                  <Btn variant="success" size="sm" onClick={()=>aceitar(p.id)}><Ico name="check" size={13}/> Aceitar</Btn>
                  <Btn variant="secondary" size="sm" onClick={()=>recusar(p.id)}><Ico name="x" size={13}/> Recusar</Btn>
                </CardPac>
              ))}
            </div>
          }
        </Card>

        {/* Enviados */}
        <Card style={{padding:18}}>
          <div style={{fontSize:14,fontWeight:700,color:C.purple,marginBottom:12,display:"flex",alignItems:"center",gap:7}}>

/* ══════════════════════════════════════════════════════
   HISTÓRICO — altas, óbitos, negativas
══════════════════════════════════════════════════════ */
const HistoricoView=({pacientes,equipe,role})=>{
  const [busca,setBusca]=useState("");
  const [filtro,setFiltro]=useState("todos");

  const lista=useMemo(()=>{
    const base=role==="equipe"?pacientes.filter(p=>p.equipe===equipe):pacientes;
    return base
      .filter(p=>["alta","obito","negativa"].includes(p.status))
      .filter(p=>filtro==="todos"||p.status===filtro)
      .filter(p=>!busca||p.nome.toLowerCase().includes(busca.toLowerCase())||p.id.toLowerCase().includes(busca.toLowerCase()))
      .sort((a,b)=>a.nome.localeCompare(b.nome,"pt-BR"));
  },[pacientes,equipe,role,filtro,busca]);

  const exportCSV=()=>{
    const rows=[["Prontuário","Nome","Nascimento","Admissão","Status","Equipe","CID","Motivo"],
      ...lista.map(p=>[p.id,p.nome,p.nascimento||"",p.admissao||"",STATUS_MAP[p.status]?.label||p.status,p.equipe,p.cid||"",p.motivo||""])];
    const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(";")).join("\n");
    const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="historico_pacientes.csv";a.click();
  };

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
      <PageHeader title="Histórico" breadcrumb="Alta · Óbito · Não Elegível"/>
      {/* Filtros */}
      <div style={{padding:"12px 24px",background:C.surface,borderBottom:`1px solid ${C.border}`,display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
        <div style={{position:"relative",flex:1,minWidth:220}}>
          <span style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",pointerEvents:"none",display:"flex"}}><Ico name="search" size={14} color={C.textMuted}/></span>
          <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Buscar por nome ou prontuário..."
            style={{width:"100%",padding:"8px 12px 8px 34px",borderRadius:C.radiusSm,border:`1.5px solid ${C.border}`,fontSize:13,fontFamily:"inherit",outline:"none"}}/>
        </div>
        <Select label="" value={filtro} onChange={setFiltro}
          options={[{value:"todos",label:"Todos"},{value:"alta",label:"Alta"},{value:"obito",label:"Óbito"},{value:"negativa",label:"Não Elegível"}]}/>
        <Btn variant="secondary" size="sm" onClick={exportCSV}><Ico name="note" size={13}/> Exportar CSV</Btn>
      </div>
      {/* Lista */}
      <div style={{flex:1,overflowY:"auto",padding:"0 24px 24px"}}>
        <div style={{fontSize:11,color:C.textMuted,padding:"10px 0 6px"}}>{lista.length} registro(s)</div>
        <Card style={{overflow:"hidden",padding:0}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead>
              <tr style={{background:C.surfaceAlt,borderBottom:`1px solid ${C.border}`}}>
                {["PACIENTE","PRONTUÁRIO","ADMISSÃO","STATUS","CID","EQUIPE"].map(h=>(
                  <th key={h} style={{padding:"10px 14px",textAlign:"left",fontSize:10,fontWeight:600,color:C.textMuted,letterSpacing:"0.06em"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {lista.length===0&&<tr><td colSpan={6} style={{padding:"40px",textAlign:"center",color:C.textMuted,fontSize:13}}>Nenhum registro encontrado.</td></tr>}
              {lista.map(p=>{
                const idade=calcIdade(p.nascimento);
                const bg=avatarColor(p.nome);
                return (
                  <tr key={p.id} style={{borderBottom:`1px solid ${C.border}`}}>
                    <td style={{padding:"11px 14px"}}>
                      <div style={{display:"flex",alignItems:"center",gap:9}}>
                        <div style={{width:32,height:32,borderRadius:"50%",background:bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:"#fff",flexShrink:0}}>{initials(p.nome)}</div>
                        <div>
                          <div style={{fontSize:13,fontWeight:600,color:C.text}}>{p.nome}</div>
                          <div style={{fontSize:11,color:C.textMuted}}>{idade!=null?`${idade} anos · `:""}{p.sexo||"—"}</div>
                        </div>
                      </div>
                    </td>
                    <td style={{padding:"11px 14px"}}><span style={{padding:"2px 7px",borderRadius:C.radiusXs,background:C.neutralBg,fontSize:11,fontWeight:600,fontFamily:"monospace"}}>{p.id}</span></td>
                    <td style={{padding:"11px 14px",fontSize:12,color:C.textSec}}>{p.admissao||"—"}</td>
                    <td style={{padding:"11px 14px"}}><Badge status={p.status}/></td>
