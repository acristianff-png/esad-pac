/* ══════════════════════════════════════════════════════
   ABA AVALIAÇÃO / ADMISSÃO (fundidas)
══════════════════════════════════════════════════════ */
const AVAL_INIT={nome:"",nascimento:"",cpf:"",telefone:"",sexo:"Feminino",nomeCuidador:"",telCuidador:"",dataDocumentos:"",equipe:"Equipe 01",origemTipo:"",origemDetalhe:"",motivo:""};

const AvaliacaoAdmissao=({pacientes,setPacientes,equipeDefault,role,user})=>{
  const [novoOpen,setNovoOpen]=useState(false);
  const [form,setForm]=useState({...AVAL_INIT,equipe:equipeDefault||EQUIPES_LIST[0]});
  const [errs,setErrs]=useState({});
  const [expandidoAval,setExpandidoAval]=useState({}); // {id:bool}
  /* campos de avaliação por paciente */
  const [cardForms,setCardForms]=useState({}); // {id:{leito,hipotese,aih,idasLeito}}
  /* modal de nova avaliação */
  const [novaAvalId,setNovaAvalId]=useState(null);
  const [novaAvalForm,setNovaAvalForm]=useState({data:hoje(),profissional:"",observacao:""});
  /* recusa admissão */
  const [recusaOpen,setRecusaOpen]=useState({}); // {id:bool}
  const [recusaMotivo,setRecusaMotivo]=useState({}); // {id:string}
  /* admissão clínica */
  const [admAlvo,setAdmAlvo]=useState(null);
  const [admClinico,setAdmClinico]=useState({...FORM_CLINICO_INIT});
  const [savedMsg,setSavedMsg]=useState("");
  const flash=(m)=>{setSavedMsg(m);setTimeout(()=>setSavedMsg(""),3500);};
  const setF=(k,v)=>setForm(f=>({...f,[k]:v}));

  const emAval=pacientes.filter(p=>p.status==="avaliacao"&&(role==="equipe"?p.equipe===equipeDefault:true));

  const getCF=(p)=>cardForms[p.id]||{leito:p.avaliacaoNota?.leito||"",hipotese:p.avaliacaoNota?.hipotese||"",aih:p.avaliacaoNota?.aih||"Não",idasLeito:p.avaliacaoNota?.idasLeito||0};
  const setCF=(id,k,v)=>setCardForms(prev=>({...prev,[id]:{...(prev[id]||{}), [k]:v}}));

  const handleNovaAval=(p)=>{
    if(!novaAvalForm.profissional.trim()){alert("Informe o profissional que realizou a avaliação.");return;}
    const cf=getCF(p);
    const entry={id:Date.now(),data:novaAvalForm.data||hoje(),profissional:novaAvalForm.profissional,observacao:novaAvalForm.observacao,...cf};
    setPacientes(prev=>prev.map(x=>x.id===p.id?{...x,avaliacoes:[...(x.avaliacoes||[]),entry],avaliacaoNota:{...cf}}:x));
    setNovaAvalId(null);setNovaAvalForm({data:hoje(),profissional:"",observacao:""});
    flash("✓ Avaliação registrada no histórico.");
  };

  const handleAdmitir=()=>{
    if(!admClinico.cid||!admClinico.perfil||!admClinico.ad){alert("Preencha CID, Perfil Epidemiológico e Classificação AD.");return;}
    setPacientes(prev=>prev.map(p=>p.id===admAlvo.id?{...p,status:"ativo",admissao:hoje(),...admClinico}:p));
    setAdmAlvo(null);flash("✓ Paciente admitido com sucesso!");
  };

  const handleRecusar=(p)=>{
    const m=recusaMotivo[p.id];
    if(!m){alert("Selecione o motivo da não admissão.");return;}
    setPacientes(prev=>prev.map(x=>x.id===p.id?{...x,status:"negativa",motivo:m}:x));
    flash("✓ Paciente registrado como Não Elegível.");
  };

  const validate=()=>{
    const e={};
    if(!form.nome.trim()) e.nome="Obrigatório";
    if(!form.nascimento.trim()) e.nascimento="Obrigatório";
    if(!form.motivo.trim()) e.motivo="Descreva o motivo";
    const p=gerarProntuario(form.nome,form.nascimento);
    if(!p) e.nome="Mín. 2 palavras";
    setErrs(e);return !Object.keys(e).length;
  };

  const handleRegistrar=()=>{
    if(!validate()) return;
    const pron=gerarProntuario(form.nome,form.nascimento);
    setPacientes(prev=>[...prev,{
      ...form,id:pron,status:"avaliacao",admissao:"",
      cid:"",cidCronico:"",cidInternacao:"",perfil:"",ad:"",score:0,
      SVD:false,O2:false,SNE:false,GTT:false,TQT:false,VM:false,
      Hipodermoclise:false,ATB:false,CurativoEsp:false,
      atb1:"",atb2:"",atb1Outro:"",atb2Outro:"",o2Indicacao:"Não",paliativo:"NÃO",comorbidades:[],
      transferenciaDest:"",transferenciaOrig:"",transferenciaNote:"",atividades:[],avaliacaoNota:null,avaliacoes:[],
    }]);
    setForm({...AVAL_INIT,equipe:equipeDefault||EQUIPES_LIST[0]});
    setNovoOpen(false);flash("✓ Paciente registrado para avaliação!");
  };

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>

      {/* Header */}
      <div style={{padding:"16px 28px",borderBottom:`1px solid ${C.border}`,background:C.surface,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontSize:10,color:C.textMuted,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:3}}>Home › Avaliação</div>
          <div style={{fontSize:20,fontWeight:800,color:C.text,letterSpacing:"-0.02em"}}>
            Em Avaliação <span style={{fontSize:14,fontWeight:400,color:C.textMuted}}>({emAval.length} paciente{emAval.length!==1?"s":""})</span>
          </div>
        </div>
        <Btn onClick={()=>setNovoOpen(true)}><Ico name="plus" size={15}/> Novo Paciente</Btn>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"20px 28px",display:"flex",flexDirection:"column",gap:14}}>
        {savedMsg&&<div style={{padding:"10px 16px",background:C.successBg,borderRadius:C.radiusXs,fontSize:13,fontWeight:600,color:C.success,border:`1px solid ${C.successBd}`}}>{savedMsg}</div>}

        {emAval.length===0&&(
          <div style={{padding:"48px",textAlign:"center",color:C.textMuted,background:C.surface,borderRadius:C.radius,border:`1.5px dashed ${C.border}`}}>
            <div style={{marginBottom:10,display:"flex",justifyContent:"center"}}><Ico name="clipboard" size={32} color={C.textMuted}/></div>
            <div style={{fontSize:14,fontWeight:600}}>Nenhum paciente em avaliação</div>
            <div style={{fontSize:12,marginTop:4}}>Clique em "Novo Paciente" para registrar um encaminhamento.</div>
          </div>
        )}

        {emAval.map(p=>{
          const idade=calcIdade(p.nascimento);
          const cf=getCF(p);
          const avaliacoes=p.avaliacoes||[];
          const bg=avatarColor(p.nome);
          const isRecusaOpen=recusaOpen[p.id];
          const expanded=!!expandidoAval[p.id];
          const toggleExp=()=>setExpandidoAval(prev=>({...prev,[p.id]:!prev[p.id]}));
          const ultimaAval=avaliacoes.length>0?avaliacoes[avaliacoes.length-1]:null;

          return (
            <Card key={p.id} style={{padding:0,overflow:"hidden"}}>
              {/* ── Cabeçalho clicável ── */}
              <div onClick={toggleExp} style={{padding:"14px 20px",background:expanded?C.primaryLt:C.surfaceAlt,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:12,cursor:"pointer",transition:"background 0.15s"}}>
                <div style={{width:42,height:42,borderRadius:"50%",background:bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:"#fff",flexShrink:0}}>{initials(p.nome)}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:700,color:C.text}}>{p.nome}</div>
                  <div style={{fontSize:11,color:C.textMuted,marginTop:2,display:"flex",gap:10,flexWrap:"wrap"}}>
                    <span>{idade!=null?`${idade} anos · `:""}Prontuário: {p.id}</span>
                    <span>Equipe: {p.equipe}</span>
                    {p.origemTipo&&<span>Origem: {p.origemTipo}{p.origemDetalhe?` — ${p.origemDetalhe}`:""}</span>}
                    {avaliacoes.length>0&&<span style={{color:C.primary,fontWeight:600}}>{avaliacoes.length} avaliação{avaliacoes.length!==1?"ões":""}</span>}
                    {ultimaAval&&<span style={{color:C.textMuted}}>Última: {ultimaAval.data}</span>}
                  </div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <Badge status="avaliacao"/>
                  <div style={{width:28,height:28,borderRadius:C.radiusXs,border:`1.5px solid ${C.border}`,background:C.surface,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <Ico name={expanded?"chevronUp":"chevronDown"} size={14} color={C.textSec}/>
                  </div>
                </div>
              </div>

              {expanded&&(<>
              {/* ── Dados do paciente ── */}
              <div style={{padding:"14px 20px",display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:"6px 16px",borderBottom:`1px solid ${C.border}`}}>
                {[
                  ["Nascimento",p.nascimento||"—"],["Sexo",p.sexo||"—"],["CPF",p.cpf||"—"],
                  ["Telefone",p.telefone||"—"],["Cuidador",p.nomeCuidador||"—"],["Tel. Cuidador",p.telCuidador||"—"],
                  ["Docs. recebidos",p.dataDocumentos||"—"],["Origem",p.origemTipo?(p.origemTipo+(p.origemDetalhe?` — ${p.origemDetalhe}`:"")):("—")],
                ].map(([l,v])=>(
                  <div key={l}>
                    <div style={{fontSize:9,fontWeight:700,color:C.textMuted,textTransform:"uppercase",letterSpacing:"0.06em"}}>{l}</div>
                    <div style={{fontSize:12,color:C.textSec,marginTop:1}}>{v}</div>
                  </div>
                ))}
                {p.motivo&&(
                  <div style={{gridColumn:"1/-1"}}>
                    <div style={{fontSize:9,fontWeight:700,color:C.textMuted,textTransform:"uppercase",letterSpacing:"0.06em"}}>Motivo do encaminhamento</div>
                    <div style={{fontSize:12,color:C.textSec,marginTop:1}}>{p.motivo}</div>
                  </div>
                )}
              </div>

              {/* ── Campos de avaliação (editáveis) ── */}
              <div style={{padding:"14px 20px",borderBottom:`1px solid ${C.border}`}}>
                <div style={{fontSize:11,fontWeight:700,color:C.textMuted,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>Dados da Avaliação Atual</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:10}}>
                  <Input label="Leito / Localização" value={cf.leito} onChange={v=>setCF(p.id,"leito",v)} placeholder="Ex: Leito 12 — CM"/>
                  <Input label="Hipótese Diagnóstica" value={cf.hipotese} onChange={v=>setCF(p.id,"hipotese",v)} placeholder="Hipótese principal"/>
                  <Select label="AIH" value={cf.aih} onChange={v=>setCF(p.id,"aih",v)}
                    options={["Sim","Não","Aguardando"].map(x=>({value:x,label:x}))}/>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:12,fontWeight:600,color:C.textSec}}>Idas ao leito para avaliação:</span>
                  <button onClick={e=>{e.stopPropagation();setCF(p.id,"idasLeito",Math.max(0,(cf.idasLeito||0)-1));}}
                    style={{width:28,height:28,borderRadius:C.radiusXs,border:`1.5px solid ${C.border}`,background:C.surface,fontSize:16,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                  <div style={{fontSize:20,fontWeight:800,color:C.primaryDk,minWidth:32,textAlign:"center"}}>{cf.idasLeito||0}</div>
                  <button onClick={e=>{e.stopPropagation();setCF(p.id,"idasLeito",(cf.idasLeito||0)+1);}}
                    style={{width:28,height:28,borderRadius:C.radiusXs,border:`1.5px solid ${C.primary}`,background:C.primaryLt,fontSize:16,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",color:C.primaryDk}}>+</button>
                </div>
              </div>

              {/* ── Histórico de avaliações ── */}
              <div style={{padding:"12px 20px",borderBottom:`1px solid ${C.border}`,background:C.surfaceAlt}}>
                <div style={{fontSize:11,fontWeight:700,color:C.textMuted,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8}}>
                  Histórico de Avaliações ({avaliacoes.length})
                </div>
                {avaliacoes.length===0
                  ?<div style={{fontSize:12,color:C.textMuted,padding:"8px 0"}}>Nenhuma avaliação registrada ainda.</div>
                  :<div style={{display:"flex",flexDirection:"column",gap:6}}>
                    {[...avaliacoes].reverse().map((a,i)=>(
                      <div key={a.id||i} style={{padding:"9px 12px",borderRadius:C.radiusXs,background:C.surface,border:`1px solid ${C.border}`,fontSize:12}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
                          <span style={{fontWeight:700,color:C.text}}>{a.profissional}</span>
                          <span style={{fontSize:10,color:C.textMuted}}>{a.data}</span>
                        </div>
                        {a.observacao&&<div style={{color:C.textSec,marginBottom:4}}>{a.observacao}</div>}
                        <div style={{display:"flex",gap:12,fontSize:10,color:C.textMuted,flexWrap:"wrap"}}>
                          {a.leito&&<span>Leito: {a.leito}</span>}
                          {a.hipotese&&<span>Hipótese: {a.hipotese}</span>}
                          {a.aih&&<span>AIH: {a.aih}</span>}
                          {a.idasLeito>0&&<span>Idas ao leito: {a.idasLeito}</span>}
                        </div>
                      </div>
                    ))}
                  </div>
                }
              </div>

              {/* ── Seção de Recusa (condicional) ── */}
              {isRecusaOpen&&(
                <div style={{padding:"14px 20px",borderBottom:`1px solid ${C.border}`,background:C.dangerBg}}>
                  <div style={{fontSize:12,fontWeight:700,color:C.danger,marginBottom:10,display:"flex",alignItems:"center",gap:6}}><Ico name="x" size={14} color={C.danger}/> Registrar Não Elegibilidade</div>
                  <Select label="Motivo da Não Admissão" value={recusaMotivo[p.id]||""} onChange={v=>setRecusaMotivo(prev=>({...prev,[p.id]:v}))}
                    options={[{value:"",label:"— Selecione o motivo —"},...MOTIVO_NAO_ADMISSAO_LIST.map(x=>({value:x,label:x}))]}/>
                  <div style={{display:"flex",gap:8,marginTop:10}}>
                    <Btn variant="secondary" size="sm" onClick={()=>handleRecusar(p)}><Ico name="x" size={13}/> Confirmar Não Elegível</Btn>
                    <Btn variant="secondary" size="sm" onClick={()=>setRecusaOpen(prev=>({...prev,[p.id]:false}))}>Cancelar</Btn>
                  </div>
                </div>
              )}

              {/* ── Botões de ação ── */}
              <div style={{padding:"12px 20px",display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",background:C.surface}}>
                <Btn onClick={()=>{setNovaAvalId(p.id);setNovaAvalForm({data:hoje(),profissional:"",observacao:""});}}><Ico name="clipboard" size={14}/> Registrar Nova Avaliação</Btn>
                <Btn variant="success" onClick={()=>{setAdmAlvo(p);setAdmClinico({...FORM_CLINICO_INIT});}}><Ico name="check" size={14}/> Admitir</Btn>
                <Btn variant="secondary" onClick={()=>setRecusaOpen(prev=>({...prev,[p.id]:!prev[p.id]}))}><Ico name="x" size={14}/> Recusar Admissão</Btn>
              </div>
              </>)}
            </Card>
          );
        })}
      </div>

      {/* Modal — Registrar Nova Avaliação */}
      {novaAvalId&&(()=>{
        const pac=pacientes.find(p=>p.id===novaAvalId);
        if(!pac) return null;
        return (
          <Modal title={`Nova Avaliação — ${pac.nome}`} onClose={()=>setNovaAvalId(null)} width={520}>
            <div style={{display:"flex",flexDirection:"column",gap:13}}>
              <div style={{padding:"9px 13px",background:C.primaryLt,borderRadius:C.radiusXs,fontSize:12,color:C.primaryDk}}>
                Os dados de leito, hipótese, AIH e idas ao leito informados no card serão incluídos automaticamente.
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <Input label="Data da Avaliação" value={novaAvalForm.data} onChange={v=>setNovaAvalForm(f=>({...f,data:v}))} mask="date" placeholder="DD/MM/AAAA"/>
                <Input label="Profissional" value={novaAvalForm.profissional} onChange={v=>setNovaAvalForm(f=>({...f,profissional:v}))} required placeholder="Nome do profissional"/>
              </div>
              <div>
                <div style={{fontSize:11,fontWeight:600,color:C.textSec,marginBottom:6}}>Observação / Evolução</div>
                <textarea value={novaAvalForm.observacao} onChange={e=>setNovaAvalForm(f=>({...f,observacao:e.target.value}))}
                  placeholder="Descreva a avaliação, evolução clínica, intercorrências..."
                  rows={4} style={{width:"100%",padding:"10px 12px",borderRadius:C.radiusXs,border:`1.5px solid ${C.border}`,fontSize:12,fontFamily:"inherit",resize:"vertical",outline:"none",boxSizing:"border-box"}}/>
              </div>
              <div style={{display:"flex",gap:10}}>
                <Btn variant="success" onClick={()=>handleNovaAval(pac)}><Ico name="check" size={14}/> Salvar Avaliação</Btn>
                <Btn variant="secondary" onClick={()=>setNovaAvalId(null)}>Cancelar</Btn>
              </div>
            </div>
          </Modal>
        );
      })()}

      {/* Modal — Novo Paciente */}
      {novoOpen&&(
        <Modal title="Registrar Novo Paciente para Avaliação" onClose={()=>{setNovoOpen(false);setForm({...AVAL_INIT,equipe:equipeDefault||EQUIPES_LIST[0]});setErrs({});}} width={700}>
          <div style={{display:"flex",flexDirection:"column",gap:14,maxHeight:"75vh",overflowY:"auto",paddingRight:4}}>
            {gerarProntuario(form.nome,form.nascimento)&&(
              <div style={{padding:"10px 14px",background:C.primaryLt,borderRadius:C.radiusXs,fontSize:12,color:C.primaryDk,fontWeight:600,display:"flex",alignItems:"center",gap:6}}>
                <Ico name="note" size={13} color={C.primaryDk}/> Prontuário provisório: {gerarProntuario(form.nome,form.nascimento)}
              </div>
            )}
            <Divider label="Identificação"/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div style={{gridColumn:"1/-1"}}><Input label="Nome Completo" value={form.nome} onChange={v=>setF("nome",v)} mask="name" required error={errs.nome} placeholder="Nome completo do paciente"/></div>
              <Input label="Data de Nascimento" value={form.nascimento} onChange={v=>setF("nascimento",v)} mask="date" required error={errs.nascimento} placeholder="DD/MM/AAAA"/>
              <Select label="Sexo" value={form.sexo} onChange={v=>setF("sexo",v)} options={SEXO_OPTIONS}/>
              <Input label="CPF" value={form.cpf} onChange={v=>setF("cpf",v)} mask="cpf" placeholder="000.000.000-00"/>
              <Input label="Telefone do Paciente" value={form.telefone} onChange={v=>setF("telefone",v)} mask="phone"/>
              <Input label="Nome do Cuidador" value={form.nomeCuidador} onChange={v=>setF("nomeCuidador",v)} placeholder="Nome completo"/>
              <Input label="Telefone do Cuidador" value={form.telCuidador} onChange={v=>setF("telCuidador",v)} mask="phone"/>
              <Input label="Data dos Documentos" value={form.dataDocumentos} onChange={v=>setF("dataDocumentos",v)} mask="date" placeholder="DD/MM/AAAA"/>
              <Select label="Equipe" value={form.equipe} onChange={v=>setF("equipe",v)} options={EQUIPES_LIST}/>
            </div>
            <Divider label="Origem"/>
            <OrigemSelector origemTipo={form.origemTipo} origemDetalhe={form.origemDetalhe}
              onChange={(t,d)=>setForm(f=>({...f,origemTipo:t,origemDetalhe:d}))}/>
            <Divider label="Motivo do Encaminhamento"/>
            <Input label="Descrição do Motivo" value={form.motivo} onChange={v=>setF("motivo",v)}
              required error={errs.motivo} placeholder="Ex: Pós-AVC com necessidade de fisioterapia domiciliar"/>
            <div style={{display:"flex",gap:10,marginTop:4}}>
              <Btn onClick={handleRegistrar} size="lg"><Ico name="search" size={15}/> Registrar para Avaliação</Btn>
              <Btn variant="secondary" onClick={()=>{setForm({...AVAL_INIT,equipe:equipeDefault||EQUIPES_LIST[0]});setErrs({});}}>Limpar</Btn>
            </div>
          </div>
        </Modal>
      )}

      {/* Modal — Admissão clínica */}
      {admAlvo&&(
        <Modal title={`Admitir — ${admAlvo.nome}`} onClose={()=>setAdmAlvo(null)} width={760}>
          <div style={{display:"flex",flexDirection:"column",gap:16,maxHeight:"80vh",overflowY:"auto",paddingRight:4}}>
            <div style={{padding:"10px 14px",background:C.primaryLt,borderRadius:C.radiusXs,fontSize:12,color:C.primaryDk,fontWeight:500}}>
              <strong>Data de Admissão:</strong> {hoje()} (gerada automaticamente)
            </div>
            <FormClinico form={admClinico} onChange={setAdmClinico}/>
            <div style={{display:"flex",gap:10,marginTop:8}}>
              <Btn onClick={handleAdmitir} size="lg" variant="success"><Ico name="check" size={15}/> Confirmar Admissão</Btn>
              <Btn onClick={()=>setAdmAlvo(null)} variant="secondary">Cancelar</Btn>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
};

/* ══════════════════════════════════════════════════════
   EQUIPE DETALHE MODAL — analytics por equipe
══════════════════════════════════════════════════════ */
const exportCSVUtil=(rows,filename)=>{
  const csv=rows.map(r=>r.map(c=>`"${String(c||"").replace(/"/g,'""')}"`).join(";")).join("\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=filename;a.click();
};

const EquipeDetalheModal=({equipeNome,pacientes,onClose})=>{
  const [periodo,setPeriodo]=useState("mes");
  const pac=pacientes.filter(p=>p.equipe===equipeNome);
  const ativos=pac.filter(p=>p.status==="ativo");
  const emAval=pac.filter(p=>p.status==="avaliacao");
  const hist=pac.filter(p=>["alta","obito","negativa"].includes(p.status));
  const altas=pac.filter(p=>p.status==="alta");
  const obitos=pac.filter(p=>p.status==="obito");
  const negativas=pac.filter(p=>p.status==="negativa");

  const allPac=[...ativos,...emAval,...hist];
  const allAtiv=allPac.flatMap(p=>p.atividades||[]);

  /* Faixa etária */
  const faixas={"0-17":0,"18-39":0,"40-59":0,"60-79":0,"80+":0};
  allPac.forEach(p=>{const a=calcIdade(p.nascimento);if(a!=null){if(a<18)faixas["0-17"]++;else if(a<40)faixas["18-39"]++;else if(a<60)faixas["40-59"]++;else if(a<80)faixas["60-79"]++;else faixas["80+"]++;}});

  /* Top 10 CIDs */
  const cidMap={};
  allPac.forEach(p=>{if(p.cid)cidMap[p.cid]=(cidMap[p.cid]||0)+1;});
  const top10=Object.entries(cidMap).sort((a,b)=>b[1]-a[1]).slice(0,10);

  /* Atividades por tipo */
  const atMap={};
  allAtiv.forEach(a=>{atMap[a.tipo||"Outros"]=(atMap[a.tipo||"Outros"]||0)+1;});
  const atList=Object.entries(atMap).sort((a,b)=>b[1]-a[1]);

  /* Procedimentos */
  const procCount={};
  DISPS_KEYS.forEach(k=>{procCount[k]=ativos.filter(p=>p[k]).length;});

  /* Origens */
  const origMap={};
  allPac.forEach(p=>{if(p.origemTipo)origMap[p.origemTipo]=(origMap[p.origemTipo]||0)+1;});

  const maxFaixa=Math.max(1,...Object.values(faixas));
  const maxAt=Math.max(1,...atList.map(([,n])=>n));

  const handleExportCSV=()=>{
    exportCSVUtil([
      ["Relatório Equipe:",equipeNome,"Período:",periodo==="mes"?"Mês atual":periodo==="trim"?"Trimestre":"Ano"],
      [],["INDICADOR","VALOR"],
      ["Pacientes Ativos",ativos.length],["Em Avaliação",emAval.length],
      ["Altas",altas.length],["Óbitos",obitos.length],["Não Elegíveis",negativas.length],
      ["Total Atividades",allAtiv.length],
      [],["TOP CIDs","COUNT"],...top10,
      [],["FAIXA ETÁRIA","COUNT"],...Object.entries(faixas),
      [],["ATIVIDADES POR TIPO","COUNT"],...atList,
      [],["DISPOSITIVOS ATIVOS","COUNT"],...DISPS_KEYS.map(k=>[DISPS_LABELS[k],procCount[k]]),
    ],`relatorio_${equipeNome.replace(/\s/g,"_")}.csv`);
  };

  const handleExportPDF=()=>{
    try{
      const {jsPDF}=window.jspdf;
      const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
      doc.setFont("helvetica","bold");doc.setFontSize(16);
      doc.text(`Relatório — ${equipeNome}`,14,18);
      doc.setFont("helvetica","normal");doc.setFontSize(9);
      doc.text(`Gerado em ${new Date().toLocaleDateString("pt-BR")} · Período: ${periodo==="mes"?"Mês atual":periodo==="trim"?"Trimestre":"Ano"}`,14,25);
      doc.autoTable({startY:30,head:[["Indicador","Valor"]],
        body:[["Pacientes Ativos",ativos.length],["Em Avaliação",emAval.length],["Altas",altas.length],["Óbitos",obitos.length],["Não Elegíveis",negativas.length],["Total Atividades",allAtiv.length]],
        theme:"striped",headStyles:{fillColor:[37,99,235]},styles:{fontSize:9}});
      let y=doc.lastAutoTable.finalY+8;
      if(top10.length>0){doc.autoTable({startY:y,head:[["CID","Qtd"]],body:top10,theme:"striped",headStyles:{fillColor:[37,99,235]},styles:{fontSize:9}});y=doc.lastAutoTable.finalY+8;}
      if(atList.length>0){doc.autoTable({startY:y,head:[["Tipo de Atividade","Qtd"]],body:atList,theme:"striped",headStyles:{fillColor:[37,99,235]},styles:{fontSize:9}});}
      doc.save(`relatorio_${equipeNome.replace(/\s/g,"_")}.pdf`);
    }catch(e){alert("PDF indisponível. Use Exportar CSV.");}
  };

  const Bar=({pct,color})=>(
    <div style={{height:6,borderRadius:3,background:C.neutralBg,flex:1}}>
      <div style={{height:"100%",width:`${Math.min(100,pct)}%`,background:color,borderRadius:3,transition:"width 0.4s"}}/>
    </div>
  );

  return (
    <Modal title={`Análise — ${equipeNome}`} onClose={onClose} width={860}>
      <div style={{display:"flex",flexDirection:"column",gap:16,maxHeight:"80vh",overflowY:"auto",paddingRight:4}}>

        {/* Período selector + Export */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
          <div style={{display:"flex",gap:4}}>
            {[["mes","Mês atual"],["trim","Trimestre"],["ano","Ano"]].map(([v,l])=>(
              <button key={v} onClick={()=>setPeriodo(v)}
                style={{padding:"6px 14px",borderRadius:C.radiusSm,border:`1.5px solid ${periodo===v?C.primary:C.border}`,
                  background:periodo===v?C.primaryLt:C.surface,color:periodo===v?C.primaryDk:C.textSec,
                  fontFamily:"inherit",fontSize:12,fontWeight:periodo===v?700:400,cursor:"pointer"}}>
                {l}
              </button>
            ))}
          </div>
          <div style={{display:"flex",gap:8}}>
            <Btn variant="secondary" size="sm" onClick={handleExportCSV}><Ico name="note" size={13}/> CSV / Excel</Btn>
            <Btn size="sm" onClick={handleExportPDF}><Ico name="flag" size={13}/> Exportar PDF</Btn>
          </div>
        </div>

        {/* KPIs principais */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
          {[
            {l:"Pacientes Admitidos*",v:ativos.length,c:C.primary,desc:"*admitidos atualmente"},
            {l:"Captados (avaliações)",v:emAval.length+hist.length,c:C.orange,desc:"total avaliados"},
            {l:"Captados e Admitidos",v:ativos.length,c:C.success,desc:"avaliados e admitidos"},
            {l:"Vidas Assistidas",v:ativos.length+emAval.length,c:C.teal,desc:"ativos + em avaliação"},
            {l:"Altas",v:altas.length,c:C.blue,desc:"desfecho alta"},
            {l:"Óbitos",v:obitos.length,c:C.danger,desc:"desfecho óbito"},
          ].map(({l,v,c,desc})=>(
            <div key={l} style={{padding:"13px 15px",borderRadius:C.radiusSm,border:`1px solid ${C.border}`,background:C.surfaceAlt}}>
              <div style={{fontSize:10,fontWeight:600,color:C.textMuted,textTransform:"uppercase",letterSpacing:"0.07em"}}>{l}</div>
              <div style={{fontSize:26,fontWeight:800,color:c,marginTop:3}}>{v}</div>
              <div style={{fontSize:9,color:C.textMuted,marginTop:1}}>{desc}</div>
            </div>
          ))}
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>

          {/* Faixa etária */}
          <div style={{padding:14,borderRadius:C.radiusSm,border:`1px solid ${C.border}`,background:C.surface}}>
            <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:10}}>Faixa Etária</div>
            {Object.entries(faixas).map(([f,n])=>(
              <div key={f} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                <div style={{fontSize:11,color:C.textSec,minWidth:40}}>{f}</div>
                <Bar pct={(n/maxFaixa)*100} color={C.primary}/>
                <div style={{fontSize:11,fontWeight:700,color:C.text,minWidth:20,textAlign:"right"}}>{n}</div>
              </div>
            ))}
          </div>

          {/* Procedimentos */}
          <div style={{padding:14,borderRadius:C.radiusSm,border:`1px solid ${C.border}`,background:C.surface}}>
            <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:10}}>Dispositivos / Procedimentos Ativos</div>
            {DISPS_KEYS.map(k=>(
              <div key={k} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                <div style={{fontSize:11,color:C.textSec,minWidth:100,flexShrink:0}}>{DISPS_LABELS[k]}</div>
                <Bar pct={ativos.length?(procCount[k]/ativos.length)*100:0} color={C.teal}/>
                <div style={{fontSize:11,fontWeight:700,color:C.text,minWidth:20,textAlign:"right"}}>{procCount[k]}</div>
              </div>
            ))}
          </div>

          {/* Top 10 CIDs */}
          <div style={{padding:14,borderRadius:C.radiusSm,border:`1px solid ${C.border}`,background:C.surface}}>
            <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:10}}>Top 10 CIDs</div>
            {top10.length===0&&<div style={{fontSize:12,color:C.textMuted}}>Sem dados de CID.</div>}
            {top10.map(([cid,n],i)=>(
              <div key={cid} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                <div style={{fontSize:10,fontWeight:700,color:C.textMuted,minWidth:18}}>{i+1}.</div>
                <div style={{fontSize:11,fontWeight:600,color:C.primaryDk,minWidth:46}}>{cid}</div>
                <Bar pct={(n/Math.max(1,top10[0][1]))*100} color={C.purple}/>
                <div style={{fontSize:11,fontWeight:700,color:C.text,minWidth:20,textAlign:"right"}}>{n}</div>
              </div>
            ))}
          </div>

          {/* Atividades por tipo */}
          <div style={{padding:14,borderRadius:C.radiusSm,border:`1px solid ${C.border}`,background:C.surface}}>
            <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:10}}>Atendimentos por Categoria</div>
            {atList.length===0&&<div style={{fontSize:12,color:C.textMuted}}>Sem atividades registradas.</div>}
            {atList.map(([tipo,n])=>(
              <div key={tipo} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                <div style={{fontSize:11,color:C.textSec,minWidth:130,flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{tipo}</div>
                <Bar pct={(n/maxAt)*100} color={C.orange}/>
                <div style={{fontSize:11,fontWeight:700,color:C.text,minWidth:20,textAlign:"right"}}>{n}</div>
              </div>
            ))}
          </div>

          {/* Origem */}
          {Object.keys(origMap).length>0&&(
            <div style={{padding:14,borderRadius:C.radiusSm,border:`1px solid ${C.border}`,background:C.surface,gridColumn:"1/-1"}}>
              <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:10}}>Pacientes por Origem</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {Object.entries(origMap).map(([orig,n])=>(
                  <div key={orig} style={{padding:"8px 14px",borderRadius:C.radiusSm,background:C.primaryLt,border:`1px solid ${C.primary}22`}}>
                    <div style={{fontSize:10,fontWeight:600,color:C.textMuted,textTransform:"uppercase"}}>{orig}</div>
                    <div style={{fontSize:20,fontWeight:800,color:C.primaryDk}}>{n}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
    </Modal>
  );
};

/* ══════════════════════════════════════════════════════
   COORDENAÇÃO — Painel Analítico
══════════════════════════════════════════════════════ */
const DashboardCoordenacao=({pacientes,onSelectEquipe})=>{
  const [equipeDetalhe,setEquipeDetalhe]=useState(null);
  const totalATB=EQUIPE_STATS.reduce((s,e)=>s+e.ATB,0);
  const mediaATB=totalATB/22;
  const totalAtivos=EQUIPE_STATS.reduce((s,e)=>s+e.ativos,0);
  const totalAval=EQUIPE_STATS.reduce((s,e)=>s+e.avaliados,0);
  const totalMot=EQUIPE_STATS.reduce((s,e)=>s+e.motoristas,0);
  const dAd=STATS_ATU.admitidos-STATS_ANT.admitidos;
  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
      <PageHeader title="Painel Geral" breadcrumb={`Coordenação · ${new Date().toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long"})}`}/>
      <div style={{flex:1,overflowY:"auto",padding:"20px 28px",display:"flex",flexDirection:"column",gap:20}}>

        {/* KPIs globais */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
          {[
            {label:"Pacientes Ativos",v:totalAtivos,icon:"users",color:C.primary,delta:dAd},
            {label:"Em Avaliação",v:totalAval,icon:"search",color:C.orange},
            {label:"ATB Parenteral",v:totalATB,icon:"activity",color:C.danger},
            {label:"Motoristas em Campo",v:totalMot,icon:"send",color:C.teal},
          ].map(({label,v,icon,color,delta})=>(
            <Card key={label} style={{padding:"16px 18px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div>
                  <div style={{fontSize:10,fontWeight:600,color:C.textMuted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>{label}</div>
                  <div style={{fontSize:28,fontWeight:800,color,lineHeight:1}}>{v}</div>
                  {delta!==undefined&&<div style={{fontSize:11,fontWeight:600,color:delta>=0?C.success:C.danger,marginTop:4}}>{delta>=0?"▲":"▼"} {Math.abs(delta)} vs mês ant.</div>}
                </div>
                <div style={{width:40,height:40,borderRadius:C.radiusSm,background:color+"15",display:"flex",alignItems:"center",justifyContent:"center"}}><Ico name={icon} size={18} color={color} sw={1.7}/></div>
              </div>
            </Card>
          ))}
        </div>

        {/* Comparativo Mensal */}
        <Card style={{padding:20}}>
          <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:16}}>Comparativo Mensal — Mês Atual vs Anterior</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:8}}>
            {[
              {label:"Admitidos",atu:STATS_ATU.admitidos,ant:STATS_ANT.admitidos},
              {label:"Avaliados",atu:STATS_ATU.avaliados,ant:STATS_ANT.avaliados},
              {label:"Visitas",atu:STATS_ATU.visitas,ant:STATS_ANT.visitas},
              {label:"Altas",atu:STATS_ATU.altas,ant:STATS_ANT.altas},
              {label:"Intercorrências",atu:STATS_ATU.intercorrencias,ant:STATS_ANT.intercorrencias},
              {label:"Óbitos",atu:STATS_ATU.obitos,ant:STATS_ANT.obitos},
              {label:"Não Elegíveis",atu:STATS_ATU.naoElegiveis,ant:STATS_ANT.naoElegiveis},
            ].map(({label,atu,ant})=>{
              const d=atu-ant;
              const isGood=(label==="Óbitos"||label==="Intercorrências"||label==="Não Elegíveis")?d<=0:d>=0;
              return (
                <div key={label} style={{padding:"12px 14px",borderRadius:C.radiusSm,background:C.surfaceAlt,border:`1px solid ${C.border}`}}>
                  <div style={{fontSize:10,fontWeight:600,color:C.textMuted,textTransform:"uppercase",letterSpacing:"0.06em"}}>{label}</div>
                  <div style={{fontSize:24,fontWeight:800,color:C.text,marginTop:4}}>{atu}</div>
                  <div style={{fontSize:10,fontWeight:600,color:d===0?C.neutral:isGood?C.success:C.danger,marginTop:2}}>
                    {d===0?"=":(d>0?"▲":"▼")} {Math.abs(d)} vs {ant}
                  </div>
                </div>
              );
            })}
          </div>
        </Card>

        {/* Cards de Equipes */}
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontSize:14,fontWeight:700,color:C.text}}>{EQUIPE_STATS.length} Equipes — Visão Analítica</div>
            <div style={{display:"flex",gap:10,fontSize:10,color:C.textMuted,fontWeight:600}}>
              <span style={{color:C.success}}>● Normal</span>
              <span style={{color:C.orange}}>● Atenção ATB</span>
              <span style={{color:C.danger}}>● Sobrecarga ATB</span>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(270px,1fr))",gap:12}}>
            {EQUIPE_STATS.map(e=>{
              const r=mediaATB>0?e.ATB/mediaATB:1;
              const crit=r>=1.7, warn=r>=1.3;
              const statusColor=crit?C.danger:warn?C.orange:C.success;
              const statusBg=crit?C.dangerBg:warn?C.orangeBg:C.successBg;
              const statusLabel=crit?"Sobrecarga ATB":warn?"Atenção ATB":"Normal";
              return (
                <div key={e.nome} onClick={()=>setEquipeDetalhe(e.nome)}
                  style={{background:C.surface,borderRadius:C.radius,border:`1.5px solid ${C.border}`,padding:"16px",cursor:"pointer",transition:"box-shadow 0.15s",boxShadow:C.shadow}}
                  onMouseEnter={ev=>ev.currentTarget.style.boxShadow=C.shadowMd}
                  onMouseLeave={ev=>ev.currentTarget.style.boxShadow=C.shadow}>
                  {/* Header do card */}
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                    <div style={{fontSize:13,fontWeight:700,color:C.primaryDk,lineHeight:1.2,flex:1,paddingRight:8}}>{e.nome}</div>
                    <span style={{padding:"2px 8px",borderRadius:999,fontSize:9,fontWeight:700,background:statusBg,color:statusColor,whiteSpace:"nowrap",flexShrink:0}}>{statusLabel}</span>
                  </div>
                  {/* KPIs principais */}
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
                    <div style={{padding:"8px 10px",borderRadius:C.radiusXs,background:C.primaryLt,border:`1px solid ${C.blueBd}`}}>
                      <div style={{fontSize:9,fontWeight:600,color:C.primary,textTransform:"uppercase",letterSpacing:"0.06em"}}>Ativos</div>
                      <div style={{fontSize:22,fontWeight:800,color:C.primaryDk,lineHeight:1}}>{e.ativos}</div>
                    </div>
                    <div style={{padding:"8px 10px",borderRadius:C.radiusXs,background:e.avaliados>0?C.orangeBg:C.surfaceAlt,border:`1px solid ${e.avaliados>0?C.orangeBd:C.border}`}}>
                      <div style={{fontSize:9,fontWeight:600,color:e.avaliados>0?C.orange:C.textMuted,textTransform:"uppercase",letterSpacing:"0.06em"}}>Em Avaliação</div>
                      <div style={{fontSize:22,fontWeight:800,color:e.avaliados>0?C.orange:C.textMuted,lineHeight:1}}>{e.avaliados}</div>
                    </div>
                  </div>
                  {/* Dispositivos */}
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    {[
                      {label:"SVD",v:e.SVD,c:C.blue},
                      {label:"O₂",v:e.O2,c:C.teal},
                      {label:"ATB",v:e.ATB,c:crit?C.danger:warn?C.orange:C.textSec},
                      {label:"Cur.Esp",v:e.CurativoEsp,c:C.purple},
                      {label:"Motoristas",v:e.motoristas,c:C.neutral},
                    ].map(({label,v,c})=>(
                      <div key={label} style={{padding:"3px 8px",borderRadius:999,background:C.surfaceAlt,border:`1px solid ${C.border}`,fontSize:10,fontWeight:600}}>
                        <span style={{color:C.textMuted}}>{label}: </span><span style={{color:c}}>{v}</span>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
      {equipeDetalhe&&<EquipeDetalheModal equipeNome={equipeDetalhe} pacientes={pacientes} onClose={()=>setEquipeDetalhe(null)}/>}
    </div>
  );
};

/* ══════════════════════════════════════════════════════
   APP PRINCIPAL
══════════════════════════════════════════════════════ */
function App(){
  const [user,setUser]=useState(null);
  const [role,setRole]=useState(null);
  const [page,setPage]=useState(null);
  const [pacientes,setPacientes]=useState(PACIENTES_MOCK);

  const equipe=useMemo(()=>{
    if(!user) return null;
    const local=user.split("@")[0];
    return EQUIPES_LIST.find(e=>e.toLowerCase().replace(/\s/g,"")===local)||EQUIPES_LIST[0];
  },[user]);

  const handleLogin=(email,r)=>{setUser(email);setRole(r);setPage(r==="coordenacao"?"coord_dash":"dashboard");};
  const handleLogout=()=>{setUser(null);setRole(null);setPage(null);};

  if(!user) return <LoginView onLogin={handleLogin}/>;

  const render=()=>{
    switch(page){
      /* EQUIPE */
      case "dashboard":       return <Dashboard pacientes={pacientes} equipe={equipe} role={role} setPacientes={setPacientes}/>;
      case "pac_ativos":      return <PacientesList pacientes={pacientes} equipe={equipe} role={role} setPacientes={setPacientes} userEmail={user} statusFiltro={["ativo"]}/>;
      case "pac_avaliacao":   return <AvaliacaoAdmissao pacientes={pacientes} setPacientes={setPacientes} equipeDefault={equipe} role={role} user={user}/>;
      case "encaminhamentos": return <EncaminhamentosView pacientes={pacientes} setPacientes={setPacientes} equipe={equipe}/>;
      case "historico":       return <HistoricoView pacientes={pacientes} equipe={equipe} role={role}/>;
      /* COORDENAÇÃO */
      case "coord_dash":      return <DashboardCoordenacao pacientes={pacientes} onSelectEquipe={()=>setPage("pacientes")}/>;
      case "pacientes":       return <PacientesList pacientes={pacientes} equipe={equipe} role={role} setPacientes={setPacientes} userEmail={user}/>;
      case "avaliacao":       return <AvaliacaoAdmissao pacientes={pacientes} setPacientes={setPacientes} equipeDefault={equipe} role={role} user={user}/>;
      case "acessos":         return <GestaoAcessos/>;
      default:                return <div style={{padding:32,color:C.textMuted,fontSize:14}}>Selecione uma opção no menu.</div>;
    }
  };

  return (
    <div style={{display:"flex",height:"100vh",background:C.bg,fontFamily:"'Plus Jakarta Sans','Segoe UI',system-ui,sans-serif",fontWeight:400,overflow:"hidden"}}>
      <Sidebar role={role} page={page} setPage={setPage} user={user} onLogout={handleLogout}/>
      <main style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",background:C.bg}}>{render()}</main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
