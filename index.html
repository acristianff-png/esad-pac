const gerarProntuario = (nome,nasc)=>{
  if(!nome||!nasc) return "";
  const ini=nome.trim().split(/\s+/).filter(Boolean).map(p=>p[0]).join("").toUpperCase().replace(/[^A-Z]/g,"");
  const nums=nasc.replace(/\D/g,"");
  if(ini.length<2||nums.length<8) return "";
  return `${ini}${nums.slice(0,2)}${nums.slice(2,4)}${nums.slice(4,8)}`;
};
const calcIdade=nasc=>{
  if(!nasc) return null;
  const [dd,mm,aaaa]=nasc.split("/");
  if(!dd||!mm||!aaaa||aaaa.length<4) return null;
  const today=new Date(),birth=new Date(`${aaaa}-${mm}-${dd}`);
  let age=today.getFullYear()-birth.getFullYear();
  const m=today.getMonth()-birth.getMonth();
  if(m<0||(m===0&&today.getDate()<birth.getDate())) age--;
  return isNaN(age)?null:age;
};
const diasAdmitido=adm=>{
  if(!adm) return null;
  const [dd,mm,aaaa]=adm.split("/");
  if(!dd||!mm||!aaaa||aaaa.length<4) return null;
  const diff=(Date.now()-new Date(`${aaaa}-${mm}-${dd}`))/86400000;
  return isNaN(diff)?null:Math.max(0,Math.floor(diff));
};
const maskDate=v=>{const d=v.replace(/\D/g,"").slice(0,8);if(d.length<=2)return d;if(d.length<=4)return`${d.slice(0,2)}/${d.slice(2)}`;return`${d.slice(0,2)}/${d.slice(2,4)}/${d.slice(4)}`;};
const maskCPF=v=>{const d=v.replace(/\D/g,"").slice(0,11);if(d.length<=3)return d;if(d.length<=6)return`${d.slice(0,3)}.${d.slice(3)}`;if(d.length<=9)return`${d.slice(0,3)}.${d.slice(3,6)}.${d.slice(6)}`;return`${d.slice(0,3)}.${d.slice(3,6)}.${d.slice(6,9)}-${d.slice(9)}`;};
const maskPhone=v=>{const d=v.replace(/\D/g,"").slice(0,11);if(d.length<=2)return`(${d}`;if(d.length<=7)return`(${d.slice(0,2)}) ${d.slice(2)}`;return`(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`;};
const maskCID=v=>v.replace(/[^A-Za-z0-9.]/g,"").toUpperCase().slice(0,7);
const hoje=()=>new Date().toLocaleDateString("pt-BR");

const Input=({label,value,onChange,placeholder,mask,type="text",required,error,hint,disabled,style={}})=>{
  const handle=e=>{
    let v=e.target.value;
    if(mask==="date")  v=maskDate(v);
    if(mask==="cpf")   v=maskCPF(v);
    if(mask==="phone") v=maskPhone(v);
    if(mask==="cid")   v=maskCID(v);
    if(mask==="name")  v=v.replace(/[0-9]/g,"");
    onChange(v);
  };
  return (
    <div style={{display:"flex",flexDirection:"column",gap:3,...style}}>
      {label&&<label style={{fontSize:11,fontWeight:600,color:error?C.danger:C.textMuted,letterSpacing:"0.04em",textTransform:"uppercase"}}>{label}{required&&<span style={{color:C.danger}}> *</span>}</label>}

        style={{padding:"9px 12px",borderRadius:C.radiusXs,border:`1.5px solid ${error?C.danger:C.border}`,

};

    Math.round(ativos.reduce((s,p)=>{const d=diasAdmitido(p.admissao);return d!=null?s+d:s;},0)/ativos.length):0;

  /* Motoristas census */
  const [numMot,setNumMot]=useState(2);

  const totalHoras=motoristas.reduce((s,m)=>s+(parseFloat(m.horas)||0),0);
  const kmMes=totalKm+1240; // mock acumulado

  /* Transferências pendentes recebidas */
  const transfsRecebidas=pacientes.filter(p=>p.status==="transferencia"&&p.transferenciaDest===equipe);
  const aceitarTransf=useCallback((id)=>{

  },[setPacientes]);
  const recusarTransf=useCallback((id)=>{
    setPacientes(prev=>prev.map(p=>p.id===id?{...p,status:"ativo",transferenciaOrig:"",transferenciaDest:"",transferenciaNote:""}:p));
  },[setPacientes]);

        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:8}}>
          {[
            {label:"Admitidos",atu:STATS_ATU.admitidos,ant:STATS_ANT.admitidos},

            {label:"Não Elegíveis",atu:STATS_ATU.naoElegiveis,ant:STATS_ANT.naoElegiveis},
          ].map(({label,atu,ant})=>{
            const d=atu-ant;
            const isGood=(label==="Óbitos"||label==="Intercorrências"||label==="Não Elegíveis")?d<=0:d>=0;
            return (
              <div key={label} style={{padding:"10px 12px",borderRadius:C.radiusXs,background:C.surfaceAlt,border:`1px solid ${C.border}`}}>
                <div style={{fontSize:10,fontWeight:900,color:C.textMuted,textTransform:"uppercase",letterSpacing:"0.06em"}}>{label}</div>
                <div style={{fontSize:22,fontWeight:900,color:C.text,marginTop:2}}>{atu}</div>
                <div style={{fontSize:10,fontWeight:900,color:d===0?C.neutral:isGood?C.success:C.danger}}>
                  {d===0?"=":(d>0?"▲":"▼")} {Math.abs(d)} vs {ant}
                </div>
              </div>
            );
          })}
        </div>
      </Card>

      {/* Dispositivos e Procedimentos Ativos */}
      <Card style={{padding:18}}>
        <div style={{fontSize:13,fontWeight:900,color:C.text,marginBottom:14}}>Dispositivos e Procedimentos Ativos</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {DISPS_KEYS.map(k=>{
            const count=ativos.filter(p=>p[k]).length;
            const pct=ativos.length?(count/ativos.length)*100:0;
            return (
              <div key={k}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                  <span style={{fontSize:12,color:C.textSec}}>{DISPS_ICONS[k]} {DISPS_LABELS[k]}</span>
                  <span style={{fontSize:12,fontWeight:900,color:count>0?C.primary:C.textMuted}}>{count}</span>
                </div>
                <div style={{height:4,borderRadius:2,background:C.neutralBg}}>
                  <div style={{height:"100%",width:`${pct}%`,background:C.primary,borderRadius:2,transition:"width 0.4s"}}/>
                </div>
              </div>
            );
          })}
        </div>
      </Card>

      {/* Pacientes ativos — Nome, Idade, Permanência */}
      <Card style={{padding:18}}>
        <div style={{fontSize:13,fontWeight:900,color:C.text,marginBottom:14}}>Pacientes Ativos</div>
        {ativos.length===0&&<div style={{color:C.textMuted,fontSize:13}}>Nenhum paciente ativo.</div>}
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {ativos.map(p=>{
            const dias=diasAdmitido(p.admissao);
            const idade=calcIdade(p.nascimento);
            const alertDias=dias!=null&&dias>60;
            const warnDias=dias!=null&&dias>30&&dias<=60;
            const disps=DISPS_KEYS.filter(k=>p[k]);
            return (
              <div key={p.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 13px",
                borderRadius:C.radiusXs,border:`1px solid ${C.border}`,background:C.surfaceAlt}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:900,color:C.text}}>{p.nome}</div>
                  <div style={{fontSize:11,color:C.textMuted,marginTop:1}}>
                    {idade!=null?`${idade} anos · `:""}Prontuário: {p.id}
                  </div>
                </div>
                <div style={{display:"flex",gap:4,flexWrap:"wrap",justifyContent:"flex-end",maxWidth:180}}>
                  {disps.slice(0,3).map(k=>(
                    <span key={k} style={{fontSize:10,padding:"2px 6px",borderRadius:10,background:C.primaryLt,color:C.primaryDk,fontWeight:900}}>{k}</span>
                  ))}
                  {disps.length>3&&<span style={{fontSize:10,color:C.textMuted}}>+{disps.length-3}</span>}
                </div>
                {dias!=null&&(
                  <div style={{padding:"4px 10px",borderRadius:10,fontWeight:900,fontSize:12,whiteSpace:"nowrap",
                    background:alertDias?C.dangerBg:warnDias?C.orangeBg:C.primaryLt,
                    color:alertDias?C.danger:warnDias?C.orange:C.primaryDk}}>
                    {dias}d
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </Card>

      {/* Transferências recebidas pendentes */}
      {transfsRecebidas.length>0&&(
        <Card style={{padding:18,border:`2px solid ${C.orangeBd}`}}>
          <div style={{fontSize:13,fontWeight:900,color:C.orange,marginBottom:12}}>📤 Transferências Recebidas ({transfsRecebidas.length})</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {transfsRecebidas.map(p=>(
              <div key={p.id} style={{padding:"10px 13px",borderRadius:C.radiusXs,background:C.orangeBg,border:`1px solid ${C.orangeBd}`}}>
                <div style={{fontSize:13,fontWeight:900}}>{p.nome}</div>
                <div style={{fontSize:11,color:C.textSec,margin:"2px 0 8px"}}>
                  De: {p.transferenciaOrig} · {p.transferenciaNote||"Sem observações"}
                </div>
                <div style={{display:"flex",gap:8}}>
                  <Btn variant="success" size="sm" onClick={()=>aceitarTransf(p.id)}>✅ Aceitar</Btn>
                  <Btn variant="secondary" size="sm" onClick={()=>recusarTransf(p.id)}>❌ Recusar</Btn>
                </div>
              </div>
            ))}
          </div>
        </Card>
      )}

      {/* Censo Diário — Motoristas */}
      <Card style={{padding:18}}>
        <div style={{fontSize:13,fontWeight:900,color:C.text,marginBottom:14}}>Censo do Dia — Motoristas em Plantão</div>
        <div style={{display:"flex",align:"center",gap:14,marginBottom:14,flexWrap:"wrap"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:12,fontWeight:900,color:C.textMuted}}>Nº DE MOTORISTAS</span>
            <select value={numMot} onChange={e=>{const n=parseInt(e.target.value);setNumMot(n);setMotoristas(Array.from({length:n},(_,i)=>motoristas[i]||{km:"",horas:""}));}}
              style={{padding:"6px 10px",borderRadius:C.radiusXs,border:`1.5px solid ${C.border}`,fontSize:13,fontFamily:"inherit"}}>
              {[1,2,3,4,5].map(n=><option key={n} value={n}>{n}</option>)}
            </select>
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
          {motoristas.slice(0,numMot).map((m,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",background:C.surfaceAlt,borderRadius:C.radiusXs,border:`1px solid ${C.border}`}}>
              <span style={{fontSize:12,fontWeight:900,color:C.textMuted,minWidth:70}}>Motorista {i+1}</span>
              <Input label="Km hoje" value={m.km} onChange={v=>updateMot(i,"km",v)} type="number" placeholder="0" style={{maxWidth:90}}/>
              <Input label="Horas hoje" value={m.horas} onChange={v=>updateMot(i,"horas",v)} type="number" placeholder="0" style={{maxWidth:90}}/>
            </div>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div style={{padding:"10px 14px",background:C.primaryLt,borderRadius:C.radiusXs}}>
            <div style={{fontSize:10,fontWeight:900,color:C.primaryDk,textTransform:"uppercase"}}>Km Acumulado no Mês</div>
            <div style={{fontSize:22,fontWeight:900,color:C.primary}}>{(kmMes).toFixed(0)} km</div>
            <div style={{fontSize:10,color:C.textMuted}}>Hoje: {totalKm.toFixed(0)} km</div>
          </div>
          <div style={{padding:"10px 14px",background:C.blueBg,borderRadius:C.radiusXs}}>
            <div style={{fontSize:10,fontWeight:900,color:C.blue,textTransform:"uppercase"}}>Horas Acumuladas no Mês</div>
            <div style={{fontSize:22,fontWeight:900,color:C.blue}}>{(horasMes).toFixed(0)} h</div>
            <div style={{fontSize:10,color:C.textMuted}}>Hoje: {totalHoras.toFixed(0)} h</div>
          </div>
        </div>
      </Card>
    </div>
  );
};

/* ══════════════════════════════════════════════════════
   ABA PACIENTES
══════════════════════════════════════════════════════ */
const PacientesList=({pacientes,equipe,role,setPacientes,userEmail})=>{
  const [busca,setBusca]=useState("");
  const [filtro,setFiltro]=useState("todos");
  const [expandido,setExpandido]=useState(null);
  const [altaAlvo,setAltaAlvo]=useState(null);
  const [transferAlvo,setTransferAlvo]=useState(null);
  const [tabPac,setTabPac]=useState({});

  const lista=useMemo(()=>{
    const base=role==="equipe"
      ?pacientes.filter(p=>p.equipe===equipe)
      :pacientes;
    return base
      .filter(p=>{
        const mf=filtro==="todos"||p.status===filtro;
        const q=busca.toLowerCase();
        const mb=!busca||p.id.toLowerCase().includes(q)||p.nome.toLowerCase().includes(q)||(p.cid||"").toLowerCase().includes(q);
        return mf&&mb;
      })
      .sort((a,b)=>a.nome.localeCompare(b.nome,"pt-BR"));
  },[pacientes,equipe,role,filtro,busca]);

  const handleAlta=(p)=>setAltaAlvo(p);
  const confirmarAlta=(p,dadosAlta)=>{
    setPacientes(prev=>prev.map(x=>x.id===p.id?{...x,status:dadosAlta.novoStatus,...dadosAlta}:x));
    setAltaAlvo(null); setExpandido(null);
  };
  const handleTransfer=(p)=>setTransferAlvo(p);
  const enviarTransfer=(id,dest,note)=>{
    setPacientes(prev=>prev.map(p=>p.id===id?{...p,status:"transferencia",transferenciaDest:dest,transferenciaOrig:equipe,transferenciaNote:note}:p));
    setTransferAlvo(null);
  };

  const filtroLabels={todos:"Todos",ativo:"Ativos",avaliacao:"Em Avaliação",alta:"Alta",obito:"Óbito",transferencia:"Transferência"};

  return (
    <div style={{padding:24,display:"flex",flexDirection:"column",gap:16}}>
      <div style={{fontSize:20,fontWeight:900,color:C.text}}>Pacientes</div>

      <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
        <input value={busca} onChange={e=>setBusca(e.target.value)}
          placeholder="🔍  Buscar por prontuário, nome ou CID..."
          style={{flex:1,minWidth:200,padding:"8px 13px",borderRadius:C.radiusSm,
            border:`1.5px solid ${C.border}`,fontSize:13,fontFamily:"inherit",fontWeight:300,outline:"none"}}/>
        {Object.entries(filtroLabels).map(([k,v])=>(
          <button key={k} onClick={()=>setFiltro(k)}
            style={{padding:"5px 11px",borderRadius:15,border:`1.5px solid ${filtro===k?C.primary:C.border}`,
              background:filtro===k?C.primaryLt:"transparent",color:filtro===k?C.primaryDk:C.textSec,
              fontSize:11,fontWeight:filtro===k?900:300,cursor:"pointer",fontFamily:"inherit"}}>
            {v}
          </button>
        ))}
      </div>

      <div style={{fontSize:11,color:C.textMuted}}>{lista.length} registro(s) · ordem alfabética</div>

      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {lista.length===0&&<Card style={{padding:32,textAlign:"center"}}><div style={{color:C.textMuted}}>Nenhum paciente encontrado</div></Card>}
        {lista.map(p=>{
          const exp=expandido===p.id;
          const dias=diasAdmitido(p.admissao);
          const idade=calcIdade(p.nascimento);
          const disps=DISPS_KEYS.filter(k=>p[k]);
          const tab=tabPac[p.id]||"dados";
          const alertDias=dias!=null&&dias>60;
          const warnDias=dias!=null&&dias>30&&dias<=60;

          return (
            <Card key={p.id} style={{overflow:"hidden"}}>
              {/* Cabeçalho */}
              <button onClick={()=>setExpandido(exp?null:p.id)}
                style={{width:"100%",padding:"13px 16px",background:"none",border:"none",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:10}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
                    <span style={{fontSize:14,fontWeight:900,color:C.text}}>{p.nome}</span>
                    <Badge status={p.status}/>
                    {p.ad&&<AdBadge val={p.ad}/>}
                  </div>
                  <div style={{fontSize:11,color:C.textMuted,marginTop:2}}>
                    {idade!=null?`${idade} anos · `:""}📋 {p.id} · {p.equipe}
                    {p.cid&&` · ${p.cid}`}
                  </div>
                </div>
                {dias!=null&&(
                  <div style={{padding:"4px 10px",borderRadius:10,fontWeight:900,fontSize:12,whiteSpace:"nowrap",
                    background:alertDias?C.dangerBg:warnDias?C.orangeBg:C.primaryLt,
                    color:alertDias?C.danger:warnDias?C.orange:C.primaryDk}}>
                    {dias}d
                  </div>
                )}
                <span style={{color:C.textMuted,fontSize:14}}>{exp?"▲":"▼"}</span>
              </button>

              {exp&&(
                <div style={{borderTop:`1px solid ${C.border}`}}>
                  {/* Tabs */}
                  <div style={{display:"flex",gap:0,borderBottom:`1px solid ${C.border}`,background:C.surfaceAlt}}>
                    {[["dados","📋 Dados"],["disps","🩺 Dispositivos"],["ativ","📅 Atividades"],["tele","📡 Telemonitoramento"]].map(([k,lbl])=>(
                      <button key={k} onClick={()=>setTabPac(prev=>({...prev,[p.id]:k}))}
                        style={{padding:"8px 14px",border:"none",borderBottom:tab===k?`2px solid ${C.primary}`:"2px solid transparent",
                          background:"transparent",cursor:"pointer",fontSize:11,fontWeight:tab===k?900:300,
                          color:tab===k?C.primaryDk:C.textMuted,fontFamily:"inherit"}}>
                        {lbl}
                      </button>
                    ))}
                  </div>

                  <div style={{padding:16}}>
                    {tab==="dados"&&(
                      <div style={{display:"flex",flexDirection:"column",gap:14}}>
                        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
                          {[["Prontuário",p.id],["Nascimento",p.nascimento],["Sexo",p.sexo||"—"],
                            ["CPF",p.cpf||"—"],["Telefone",p.telefone||"—"],["Cuidador",p.nomeCuidador||"—"],
                            ["Tel. Cuidador",p.telCuidador||"—"],["Docs. Recebidos",p.dataDocumentos||"—"],["Admissão",p.admissao||"—"],
                          ].map(([l,v])=>(
                            <div key={l}><div style={{fontSize:10,fontWeight:900,color:C.textMuted,textTransform:"uppercase"}}>{l}</div>
                            <div style={{fontSize:12,color:C.text,marginTop:1}}>{v}</div></div>
                          ))}
                        </div>
                        <Divider label="Clínico"/>
                        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
                          {[["CID Principal",p.cid||"—"],["CID Crônico",p.cidCronico||"—"],["CID Internação",p.cidInternacao||"—"],
                            ["Perfil Epidemiológico",p.perfil||"—"],["Cuidados Paliativos",p.paliativo||"NÃO"],["Score",p.score||"—"],
                            ["O2 Indicação",p.o2Indicacao||"—"],["Classificação AD",p.ad||"—"],["Origem",`${p.origem||"—"}${p.origemDetalhe?" — "+p.origemDetalhe:""}`],
                          ].map(([l,v])=>(
                            <div key={l}><div style={{fontSize:10,fontWeight:900,color:C.textMuted,textTransform:"uppercase"}}>{l}</div>
                            <div style={{fontSize:12,color:C.text,marginTop:1}}>{v}</div></div>
                          ))}
                        </div>
                        {p.comorbidades?.length>0&&(
                          <div>
                            <div style={{fontSize:10,fontWeight:900,color:C.textMuted,textTransform:"uppercase",marginBottom:6}}>Comorbidades / DCNTs</div>
                            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                              {p.comorbidades.map(c=>(
                                <span key={c} style={{padding:"2px 8px",borderRadius:10,background:C.neutralBg,border:`1px solid ${C.border}`,fontSize:11,fontWeight:900}}>{c}</span>
                              ))}
                            </div>
                          </div>
                        )}
                        <div><div style={{fontSize:10,fontWeight:900,color:C.textMuted,textTransform:"uppercase"}}>Motivo de Encaminhamento</div>
                        <div style={{fontSize:12,color:C.text,marginTop:1}}>{p.motivo||"—"}</div></div>
                      </div>
                    )}

                    {tab==="disps"&&(
                      <div style={{display:"flex",flexDirection:"column",gap:10}}>
                        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:6}}>
                          {DISPS_KEYS.map(k=>(
                            <div key={k} style={{padding:"8px 11px",borderRadius:C.radiusXs,
                              border:`1.5px solid ${p[k]?C.primary:C.border}`,
                              background:p[k]?C.primaryLt:C.surfaceAlt}}>
                              <div style={{fontSize:12,fontWeight:p[k]?900:300,color:p[k]?C.primaryDk:C.textMuted}}>
                                {DISPS_ICONS[k]} {DISPS_LABELS[k]}
                              </div>
                              <div style={{fontSize:10,color:p[k]?C.primary:C.neutral,fontWeight:900}}>{p[k]?"ATIVO":"INATIVO"}</div>
                            </div>
                          ))}
                        </div>
                        {p.ATB&&(
                          <div style={{padding:"10px 13px",background:C.yellowBg,borderRadius:C.radiusXs,border:`1px solid ${C.yellow}`}}>
                            <div style={{fontSize:11,fontWeight:900,color:C.brown}}>ANTIBIOTICOTERAPIA PARENTERAL</div>
                            <div style={{fontSize:13,marginTop:4}}>ATB 1: <strong>{p.atb1||"—"}</strong></div>
                            {p.atb2&&<div style={{fontSize:13}}>ATB 2: <strong>{p.atb2}</strong></div>}
                          </div>
                        )}
                      </div>
                    )}

                    {tab==="ativ"&&(
                      <div style={{display:"flex",flexDirection:"column",gap:10}}>
                        <div style={{fontSize:12,color:C.textMuted,marginBottom:6}}>Atividades registradas no mês atual (demonstração)</div>
                        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:8}}>
                          {[["Médico","🩺",4],["Enfermagem","👩‍⚕️",12],["Técnico Enf.","🧑‍⚕️",18],["EMAP","🏃",3],["Fisioterapia","💪",8],["Fonoaudiologia","🗣️",2]].map(([cat,ic,n])=>(
                            <div key={cat} style={{padding:"10px 12px",borderRadius:C.radiusXs,background:C.surfaceAlt,border:`1px solid ${C.border}`}}>
                              <div style={{fontSize:12,color:C.textSec}}>{ic} {cat}</div>
                              <div style={{fontSize:20,fontWeight:900,color:C.primary,marginTop:3}}>{n}</div>
                              <div style={{fontSize:10,color:C.textMuted}}>visitas</div>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}

                    {tab==="tele"&&(
                      <div style={{padding:"20px",textAlign:"center",color:C.textMuted}}>
                        <div style={{fontSize:32,marginBottom:8}}>📡</div>
                        <div style={{fontSize:13}}>Telemonitoramento em implementação.</div>
                        <div style={{fontSize:11,marginTop:4}}>Funcionalidade disponível na próxima versão.</div>
                      </div>
                    )}
                  </div>

                  {/* Ações */}
                  {p.status==="ativo"&&(
                    <div style={{padding:"10px 16px",borderTop:`1px solid ${C.border}`,display:"flex",gap:8,flexWrap:"wrap"}}>
                      <Btn variant="danger" size="sm" onClick={()=>handleAlta(p)}>🏁 Registrar Alta / Desfecho</Btn>
                      <Btn variant="orange" size="sm" onClick={()=>handleTransfer(p)}>📤 Transferir Equipe</Btn>
                    </div>
                  )}
                  {p.status==="avaliacao"&&(
                    <div style={{padding:"10px 16px",borderTop:`1px solid ${C.border}`,display:"flex",gap:8}}>
                      <Btn variant="success" size="sm" onClick={()=>handleAlta(p)}>✅ Registrar Desfecho</Btn>
                    </div>
                  )}
                </div>
              )}
            </Card>
          );
        })}
      </div>

      {altaAlvo&&<AltaModal paciente={altaAlvo} onClose={()=>setAltaAlvo(null)} onConfirm={(d)=>confirmarAlta(altaAlvo,d)}/>}
      {transferAlvo&&<TransferenciaModal paciente={transferAlvo} userEquipe={equipe} onClose={()=>setTransferAlvo(null)} onEnviar={enviarTransfer}/>}
    </div>
  );
};

/* ══════════════════════════════════════════════════════
   FORMULÁRIO CLÍNICO COMPLETO (admissão)
══════════════════════════════════════════════════════ */
const FORM_CLINICO_INIT = {
  cid:"",cidCronico:"",cidInternacao:"",perfil:"",ad:"AD1",score:"",
  SVD:false,O2:false,SNE:false,GTT:false,TQT:false,VM:false,Hipodermoclise:false,ATB:false,CurativoEsp:false,
  atb1:"",atb2:"",o2Indicacao:"Não",paliativo:"NÃO",comorbidades:[],
};

const FormClinico=({form,onChange})=>{
  const set=(k,v)=>onChange({...form,[k]:v});
  const toggleCom=(c)=>onChange({...form,comorbidades:form.comorbidades.includes(c)?form.comorbidades.filter(x=>x!==c):[...form.comorbidades,c]});
  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <Divider label="Classificação e CIDs"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:12}}>
        <Select label="Classificação AD" value={form.ad} onChange={v=>set("ad",v)} options={AD_OPTIONS} required/>
        <Input label="CID Principal" value={form.cid} onChange={v=>set("cid",v)} mask="cid" required placeholder="J44.1"/>
        <Input label="CID Principal Crônico" value={form.cidCronico} onChange={v=>set("cidCronico",v)} mask="cid" placeholder="J44.0"/>
        <Input label="CID da Internação" value={form.cidInternacao} onChange={v=>set("cidInternacao",v)} mask="cid" placeholder=""/>
        <div style={{gridColumn:"1/-1"}}>
          <Select label="Perfil Epidemiológico / Doença Base" value={form.perfil} onChange={v=>set("perfil",v)}
            options={DOENCAS_LIST} placeholder="Selecione" required/>
        </div>
        <Input label="Score Clínico" value={form.score} onChange={v=>set("score",v)} type="number" placeholder="0"/>
        <Select label="Indicação de Oxigenoterapia" value={form.o2Indicacao} onChange={v=>set("o2Indicacao",v)} options={O2_OPTIONS}/>
        <Select label="Cuidados Paliativos" value={form.paliativo} onChange={v=>set("paliativo",v)} options={PALIATIVO_OPTIONS}/>
      </div>

      <Divider label="Dispositivos e Procedimentos"/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(170px,1fr))",gap:7}}>
        {DISPS_KEYS.map(k=>(
          <Toggle key={k} label={DISPS_LABELS[k]} icon={DISPS_ICONS[k]} checked={form[k]} onChange={v=>set(k,v)}/>
        ))}
      </div>

      {form.ATB&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,padding:"12px",background:C.yellowBg,borderRadius:C.radiusXs,border:`1px solid ${C.yellow}`}}>
          <Select label="ATB 1 (obrigatório)" value={form.atb1} onChange={v=>set("atb1",v)}
            options={ATB_LIST} placeholder="Selecione" required/>
          <Select label="ATB 2 (opcional)" value={form.atb2} onChange={v=>set("atb2",v)}
            options={["—",...ATB_LIST]}/>
        </div>
      )}

      <Divider label="Comorbidades e DCNTs"/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:6}}>
        {COMORBIDADES_LIST.map(c=>(
          <label key={c} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 9px",
            borderRadius:C.radiusXs,border:`1.5px solid ${form.comorbidades.includes(c)?C.blue:C.border}`,
            background:form.comorbidades.includes(c)?C.blueBg:C.surface,cursor:"pointer",userSelect:"none"}}>
            <input type="checkbox" checked={form.comorbidades.includes(c)} onChange={()=>toggleCom(c)}
              style={{accentColor:C.blue,width:13,height:13}}/>
            <span style={{fontSize:11,fontWeight:form.comorbidades.includes(c)?900:300,color:form.comorbidades.includes(c)?C.blue:C.textSec}}>{c}</span>
          </label>
        ))}
      </div>
    </div>
  );
};

/* ══════════════════════════════════════════════════════
   ABA AVALIAÇÃO / ADMISSÃO (fundidas)
══════════════════════════════════════════════════════ */
const AVAL_INIT={nome:"",nascimento:"",cpf:"",telefone:"",sexo:"Feminino",nomeCuidador:"",telCuidador:"",dataDocumentos:"",equipe:"Equipe 01",origemTipo:"",origemDetalhe:"",motivo:""};

const AvaliacaoAdmissao=({pacientes,setPacientes,equipeDefault,role,user})=>{
  const [tab,setTab]=useState("lista");
  const [form,setForm]=useState({...AVAL_INIT,equipe:equipeDefault||"Equipe 01"});
  const [errs,setErrs]=useState({});
  const [savedMsg,setSavedMsg]=useState("");
  const [admAlvo,setAdmAlvo]=useState(null); // paciente em avaliação sendo admitido
  const [admClinico,setAdmClinico]=useState({...FORM_CLINICO_INIT});
  const [negMotivo,setNegMotivo]=useState({});

  const prontuario=gerarProntuario(form.nome,form.nascimento);
  const emAval=pacientes.filter(p=>p.status==="avaliacao"&&(role==="equipe"?p.equipe===equipeDefault:true));
  const negativas=pacientes.filter(p=>p.status==="negativa"&&(role==="equipe"?p.equipe===equipeDefault:true));

  const setF=(k,v)=>setForm(f=>({...f,[k]:v}));

  const validate=()=>{
    const e={};
    if(!form.nome.trim()) e.nome="Obrigatório";
    if(!form.nascimento.trim()) e.nascimento="Obrigatório";
    if(!form.motivo.trim()) e.motivo="Descreva o motivo";
    if(!prontuario) e.nome="Mín. 2 palavras";
    setErrs(e);
    return !Object.keys(e).length;
  };

  const handleRegistrar=()=>{
    if(!validate()) return;
    setPacientes(prev=>[...prev,{
      ...form,id:prontuario,status:"avaliacao",admissao:"",
      cid:"",cidCronico:"",cidInternacao:"",perfil:"",ad:"",score:0,
      SVD:false,O2:false,SNE:false,GTT:false,TQT:false,VM:false,
      Hipodermoclise:false,ATB:false,CurativoEsp:false,
      atb1:"",atb2:"",o2Indicacao:"Não",paliativo:"NÃO",comorbidades:[],
      transferenciaDest:"",transferenciaOrig:"",transferenciaNote:"",
    }]);
    setForm({...AVAL_INIT,equipe:equipeDefault||"Equipe 01"});
    setSavedMsg("✓ Paciente registrado para avaliação!"); setTimeout(()=>setSavedMsg(""),3500);
    setTab("lista");
  };

  const handleAdmitir=()=>{
    if(!admClinico.cid||!admClinico.perfil||!admClinico.ad){
      alert("Preencha CID, Perfil Epidemiológico e Classificação AD."); return;
    }
    setPacientes(prev=>prev.map(p=>p.id===admAlvo.id?{
      ...p,status:"ativo",admissao:hoje(),...admClinico,
    }:p));
    setAdmAlvo(null);
    setSavedMsg("✓ Paciente admitido com sucesso!"); setTimeout(()=>setSavedMsg(""),3500);
  };

  const handleNegativa=(p)=>{
    const m=negMotivo[p.id];
    if(!m){alert("Informe o motivo da negativa."); return;}
    setPacientes(prev=>prev.map(x=>x.id===p.id?{...x,status:"negativa",motivo:m}:x));
  };

  return (
    <div style={{padding:24,display:"flex",flexDirection:"column",gap:18,maxWidth:820}}>
      <div style={{fontSize:20,fontWeight:900,color:C.text}}>Avaliação / Admissão</div>

      {/* Tabs internas */}
      <div style={{display:"flex",gap:0,borderBottom:`1px solid ${C.border}`}}>
        {[["lista","📋 Em Avaliação"],["registrar","➕ Registrar Avaliado"],["negativas","❌ Negativas"]].map(([k,lbl])=>(
          <button key={k} onClick={()=>setTab(k)}
            style={{padding:"9px 16px",border:"none",borderBottom:tab===k?`2px solid ${C.primary}`:"2px solid transparent",
              background:"transparent",cursor:"pointer",fontSize:12,fontWeight:tab===k?900:300,
              color:tab===k?C.primaryDk:C.textMuted,fontFamily:"inherit"}}>
            {lbl} {k==="lista"?`(${emAval.length})`:k==="negativas"?`(${negativas.length})`:""}
          </button>
        ))}
      </div>

      {savedMsg&&<div style={{padding:"8px 14px",background:C.primaryLt,borderRadius:C.radiusXs,fontSize:13,fontWeight:900,color:C.primaryDk}}>{savedMsg}</div>}

      {/* Lista em avaliação */}
      {tab==="lista"&&(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {emAval.length===0&&<div style={{color:C.textMuted,fontSize:13,padding:"20px 0"}}>Nenhum paciente em avaliação.</div>}
          {emAval.map(p=>{
            const idade=calcIdade(p.nascimento);
            return (
              <Card key={p.id} style={{padding:"14px 16px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10}}>
                  <div>
                    <div style={{fontSize:14,fontWeight:900,color:C.text}}>{p.nome}</div>
                    <div style={{fontSize:11,color:C.textMuted,marginTop:2}}>
                      {idade!=null?`${idade} anos · `:""}📋 {p.id} · {p.equipe}
                    </div>
                    <div style={{fontSize:12,color:C.textSec,marginTop:3}}>
                      Origem: {p.origemTipo||"—"}{p.origemDetalhe?` — ${p.origemDetalhe}`:""} · Docs: {p.dataDocumentos||"—"}
                    </div>
                    <div style={{fontSize:12,color:C.textSec,marginTop:1}}>Motivo: {p.motivo||"—"}</div>
                  </div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                    <Btn variant="success" size="sm" onClick={()=>{setAdmAlvo(p);setAdmClinico({...FORM_CLINICO_INIT});}}>✅ Admitir</Btn>
                    <div style={{display:"flex",gap:5,alignItems:"center"}}>
                      <input value={negMotivo[p.id]||""} placeholder="Motivo da negativa..."
                        onChange={e=>setNegMotivo(prev=>({...prev,[p.id]:e.target.value}))}
                        style={{padding:"5px 9px",borderRadius:C.radiusXs,border:`1px solid ${C.border}`,fontSize:12,fontFamily:"inherit",width:180}}/>
                      <Btn variant="secondary" size="sm" onClick={()=>handleNegativa(p)}>❌ Não Elegível</Btn>
                    </div>
                  </div>
                </div>
              </Card>
            );
          })}
        </div>
      )}

      {/* Registrar novo avaliado */}
      {tab==="registrar"&&(
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          {prontuario&&(
            <div style={{padding:"10px 14px",background:C.yellowBg,borderRadius:C.radiusXs,border:`1px solid ${C.yellow}`,fontSize:13,color:C.brown,fontWeight:900}}>
              📋 Prontuário provisório: {prontuario}
            </div>
          )}
          <Divider label="Identificação"/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            <div style={{gridColumn:"1/-1"}}>
              <Input label="Nome Completo" value={form.nome} onChange={v=>setF("nome",v)} mask="name" required error={errs.nome} placeholder="Nome completo do paciente"/>
            </div>
            <Input label="Data de Nascimento" value={form.nascimento} onChange={v=>setF("nascimento",v)} mask="date" required error={errs.nascimento} placeholder="DD/MM/AAAA"/>
            <Select label="Sexo" value={form.sexo} onChange={v=>setF("sexo",v)} options={SEXO_OPTIONS}/>
            <Input label="CPF" value={form.cpf} onChange={v=>setF("cpf",v)} mask="cpf" placeholder="000.000.000-00"/>
            <Input label="Telefone do Paciente" value={form.telefone} onChange={v=>setF("telefone",v)} mask="phone"/>
            <Input label="Nome do Cuidador" value={form.nomeCuidador} onChange={v=>setF("nomeCuidador",v)} placeholder="Nome completo"/>
            <Input label="Telefone do Cuidador" value={form.telCuidador} onChange={v=>setF("telCuidador",v)} mask="phone"/>
            <Input label="Data de Recebimento da Documentação" value={form.dataDocumentos} onChange={v=>setF("dataDocumentos",v)} mask="date" placeholder="DD/MM/AAAA"/>
            {role==="coordenacao"&&(
              <Select label="Equipe" value={form.equipe} onChange={v=>setF("equipe",v)} options={EQUIPES_LIST}/>
            )}
          </div>
          <Divider label="Origem"/>
          <OrigemSelector origemTipo={form.origemTipo} origemDetalhe={form.origemDetalhe}
            onChange={(t,d)=>setForm(f=>({...f,origemTipo:t,origemDetalhe:d}))}/>
          <Divider label="Motivo do Encaminhamento"/>
          <Input label="Descrição do Motivo" value={form.motivo} onChange={v=>setF("motivo",v)}
            required error={errs.motivo} placeholder="Ex: Pós-AVC com necessidade de fisioterapia domiciliar"/>
          <div style={{display:"flex",gap:10,alignItems:"center",marginTop:4}}>
            <Btn onClick={handleRegistrar} size="lg">🔍 Registrar para Avaliação</Btn>
            <Btn variant="secondary" onClick={()=>{setForm({...AVAL_INIT,equipe:equipeDefault||"Equipe 01"});setErrs({});}}>Limpar</Btn>
          </div>
        </div>
      )}

      {/* Histórico negativas */}
      {tab==="negativas"&&(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {negativas.length===0&&<div style={{color:C.textMuted,fontSize:13,padding:"20px 0"}}>Nenhuma negativa registrada.</div>}
          {negativas.map(p=>(
            <div key={p.id} style={{padding:"10px 14px",borderRadius:C.radiusXs,background:C.neutralBg,border:`1px solid ${C.neutralBd}`,fontSize:12}}>
              <div style={{fontWeight:900,color:C.text}}>{p.nome} <Badge status="negativa"/></div>
              <div style={{color:C.textSec,marginTop:3}}>{p.motivo||"—"}</div>
              <div style={{color:C.textMuted,fontSize:11,marginTop:2}}>Equipe: {p.equipe} · {p.nascimento}</div>
            </div>
          ))}
        </div>
      )}

      {/* Modal admissão clínica */}
      {admAlvo&&(
        <Modal title={`Admitir — ${admAlvo.nome}`} onClose={()=>setAdmAlvo(null)} width={750}>
          <div style={{display:"flex",flexDirection:"column",gap:16}}>
            <div style={{padding:"8px 13px",background:C.primaryLt,borderRadius:C.radiusXs,fontSize:12}}>
              <strong>Data de Admissão:</strong> {hoje()} (gerada automaticamente)
            </div>
            <FormClinico form={admClinico} onChange={setAdmClinico}/>
            <div style={{display:"flex",gap:10,marginTop:8}}>
              <Btn onClick={handleAdmitir} size="lg" variant="success">✅ Confirmar Admissão</Btn>
              <Btn onClick={()=>setAdmAlvo(null)} variant="secondary">Cancelar</Btn>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
};

/* ══════════════════════════════════════════════════════
   COORDENAÇÃO — Painel e 22 Equipes
══════════════════════════════════════════════════════ */
const DashboardCoordenacao=({pacientes,onSelectEquipe})=>{
  const totalATB=EQUIPE_STATS.reduce((s,e)=>s+e.ATB,0);
  const mediaATB=totalATB/22;
  return (
    <div style={{padding:24,display:"flex",flexDirection:"column",gap:20}}>
      <div><div style={{fontSize:20,fontWeight:900,color:C.text}}>Painel Geral — Coordenação</div>
      <div style={{fontSize:12,color:C.textMuted,marginTop:2}}>22 equipes · {new Date().toLocaleDateString("pt-BR")}</div></div>
      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
        <KPI label="Pacientes Ativos" value={EQUIPE_STATS.reduce((s,e)=>s+e.ativos,0)} icon="👥" color={C.primary}/>
        <KPI label="Em Avaliação" value={EQUIPE_STATS.reduce((s,e)=>s+e.avaliados,0)} icon="🔍" color={C.orange}/>
        <KPI label="ATB Parenteral" value={totalATB} icon="🧬" color={C.danger}/>
        <KPI label="Motoristas" value={EQUIPE_STATS.reduce((s,e)=>s+e.motoristas,0)} icon="🚑" color={C.blue}/>
      </div>
      <Card style={{padding:18}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{fontSize:13,fontWeight:900,color:C.text}}>Mapa de Carga ATB — 22 Equipes</div>
          <div style={{display:"flex",gap:8,fontSize:10,color:C.textMuted,fontWeight:900}}>
            <span style={{color:C.success}}>● Normal</span>
            <span style={{color:C.orange}}>● Atenção</span>
            <span style={{color:C.danger}}>● Sobrecarga</span>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(155px,1fr))",gap:7}}>
          {EQUIPE_STATS.map(e=>{
            const r=mediaATB>0?e.ATB/mediaATB:1;
            const crit=r>=1.7, alert=r>=1.3;
            const bg=crit?C.dangerBg:alert?C.orangeBg:C.successBg;
            const bd=crit?C.dangerBd:alert?C.orangeBd:C.successBd;
            const tc=crit?C.danger:alert?C.orange:C.success;
            return (
              <button key={e.nome} onClick={()=>onSelectEquipe(e.nome)}
                style={{padding:"9px 11px",borderRadius:C.radiusXs,background:bg,border:`1.5px solid ${bd}`,cursor:"pointer",textAlign:"left"}}>
                <div style={{fontSize:11,fontWeight:900,color:tc,marginBottom:3}}>{e.nome}</div>
                <div style={{fontSize:11,color:C.textSec,display:"flex",flexDirection:"column",gap:1}}>
                  <span>👥 {e.ativos} ativos</span>
                  <span>🧬 {e.ATB} ATB</span>
                  <span>🩹 {e.CurativoEsp} cur.</span>
                  <span>🚑 {e.motoristas} mot.</span>
                </div>
                {crit&&<div style={{fontSize:9,fontWeight:900,color:C.danger,marginTop:4}}>⚠ SOBRECARGA ATB</div>}
                {alert&&!crit&&<div style={{fontSize:9,fontWeight:900,color:C.orange,marginTop:4}}>⚡ ATENÇÃO</div>}
              </button>
            );
          })}
        </div>
      </Card>
    </div>
  );
};

const CoordEquipes=({onSelectEquipe})=>{
  const mediaATB=EQUIPE_STATS.reduce((s,e)=>s+e.ATB,0)/22;
  return (
    <div style={{padding:24}}>
      <div style={{fontSize:20,fontWeight:900,color:C.text,marginBottom:4}}>22 Equipes — Detalhado</div>
      <div style={{fontSize:12,color:C.textMuted,marginBottom:16}}>Clique para ver pacientes da equipe</div>
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead>
            <tr style={{background:C.surfaceAlt}}>
              {["Equipe","Ativos","Em Aval.","SVD","O₂","ATB","Curativo","Motoristas","Status"].map(h=>(
                <th key={h} style={{padding:"9px 11px",textAlign:"left",fontWeight:900,color:C.textMuted,borderBottom:`2px solid ${C.border}`,whiteSpace:"nowrap",letterSpacing:"0.03em",fontSize:10,textTransform:"uppercase"}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {EQUIPE_STATS.map((e,i)=>{
              const r=mediaATB>0?e.ATB/mediaATB:1, alert=r>=1.3;
              return (
                <tr key={e.nome} onClick={()=>onSelectEquipe(e.nome)}
                  style={{borderBottom:`1px solid ${C.border}`,cursor:"pointer",background:i%2?C.surfaceAlt:C.surface}}>
                  <td style={{padding:"9px 11px",fontWeight:900,color:C.primary}}>{e.nome}</td>
                  <td style={{padding:"9px 11px",fontWeight:900}}>{e.ativos}</td>
                  <td style={{padding:"9px 11px",color:e.avaliados>0?C.orange:C.textMuted}}>{e.avaliados}</td>
                  <td style={{padding:"9px 11px"}}>{e.SVD}</td>
                  <td style={{padding:"9px 11px"}}>{e.O2}</td>
                  <td style={{padding:"9px 11px",fontWeight:alert?900:300,color:alert?C.danger:C.text}}>{e.ATB}</td>
                  <td style={{padding:"9px 11px"}}>{e.CurativoEsp}</td>
                  <td style={{padding:"9px 11px"}}>{e.motoristas}</td>
                  <td style={{padding:"9px 11px"}}>
                    {alert
                      ?<span style={{fontSize:9,padding:"2px 7px",borderRadius:10,background:C.dangerBg,color:C.danger,fontWeight:900}}>⚠ ALERTA ATB</span>
                      :<span style={{fontSize:9,padding:"2px 7px",borderRadius:10,background:C.successBg,color:C.success,fontWeight:900}}>✓ Normal</span>}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
};

/* ══════════════════════════════════════════════════════
   APP PRINCIPAL
══════════════════════════════════════════════════════ */
function App(){
  const [user,setUser]=useState(null);
  const [role,setRole]=useState(null);
  const [page,setPage]=useState(null);
  const [pacientes,setPacientes]=useState(PACIENTES_MOCK);

  const equipe=useMemo(()=>{
    if(!user) return null;
    const local=user.split("@")[0];
    return EQUIPES_LIST.find(e=>e.toLowerCase().replace(/\s/g,"")===local)||"Equipe 01";
  },[user]);

  const handleLogin=(email,r)=>{setUser(email);setRole(r);setPage(r==="coordenacao"?"coord_dash":"dashboard");};
  const handleLogout=()=>{setUser(null);setRole(null);setPage(null);};

  if(!user) return <LoginView onLogin={handleLogin}/>;

  const render=()=>{
    switch(page){
      case "dashboard":    return <Dashboard pacientes={pacientes} equipe={equipe} role={role} setPacientes={setPacientes}/>;
      case "coord_dash":   return <DashboardCoordenacao pacientes={pacientes} onSelectEquipe={()=>setPage("pacientes")}/>;
      case "coord_equipes":return <CoordEquipes onSelectEquipe={()=>setPage("pacientes")}/>;
      case "pacientes":    return <PacientesList pacientes={pacientes} equipe={equipe} role={role} setPacientes={setPacientes} userEmail={user}/>;
      case "avaliacao":    return <AvaliacaoAdmissao pacientes={pacientes} setPacientes={setPacientes} equipeDefault={equipe} role={role} user={user}/>;
      default:             return <div style={{padding:32,color:C.textMuted,fontSize:14}}>Selecione uma opção no menu.</div>;
    }
  };

  return (
    <div style={{display:"flex",minHeight:"100vh",background:C.bg,fontFamily:"'Plus Jakarta Sans','Segoe UI',system-ui,sans-serif",fontWeight:400}}>
      <Sidebar role={role} page={page} setPage={setPage} user={user} onLogout={handleLogout}/>
      <main style={{flex:1,overflowY:"auto",maxHeight:"100vh"}}>{render()}</main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
